<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>财富看板-全功能版</title>
    <style>
        :root {
            --ali: #1677ff; --wx: #07c160; --ths: #ff4d4f;
            --cry: #f7931a; --cmb: #c51d24; --gjj: #0052d9;
            --up: #2ecc71; --down: #e74c3c;
            --btn-blue: #0081cc; --app-bg: #f2f4f7;
        }
        body { font-family: -apple-system, sans-serif; background-color: var(--app-bg); display: flex; justify-content: center; min-height: 100vh; margin: 0; padding: 15px; box-sizing: border-box; }
        .app-card { background: #fff; border-radius: 28px; padding: 24px; width: 100%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); height: fit-content; }
        .summary-card { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); padding: 20px; border-radius: 20px; color: #fff; box-shadow: 0 10px 20px rgba(30, 60, 114, 0.2); }
        .summary-val { font-size: 28px; font-weight: 700; font-family: "DIN Alternate", sans-serif; }
        .update-time { font-size: 10px; color: #a0aec0; text-align: right; margin: 8px 0 20px 0; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px 12px; margin-bottom: 25px; }
        .label-wrap { display: flex; align-items: center; margin-bottom: 4px; font-size: 12px; color: #888; }
        .brand-line { width: 3px; height: 10px; border-radius: 2px; margin-right: 6px; }
        .input-box { position: relative; border-bottom: 1.5px solid #eee; }
        .input-box::before { content: "¥"; position: absolute; left: 0; top: 50%; transform: translateY(-50%); color: #333; font-size: 14px; font-weight: 600; }
        input { width: 100%; padding: 8px 0 8px 18px; border: none; background: transparent; font-size: 18px; font-weight: 600; outline: none; color: #333; }
        
        .btn-stack { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .save-btn { background: #1488cc; color: white; border: none; padding: 13px; border-radius: 14px; font-weight: 600; cursor: pointer; }
        .secondary-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .sec-btn { background: #f5f5f7; color: var(--btn-blue); border: 1px solid #eef0f2; padding: 10px; border-radius: 14px; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-icon { width: 18px; height: 18px; margin-right: 6px; }

        /* 历史记录标题栏 */
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .section-title { font-size: 13px; font-weight: 700; color: #333; }
        .clear-all-btn { color: var(--down); font-size: 11px; font-weight: 600; cursor: pointer; padding: 4px 8px; border-radius: 6px; background: #fff1f0; border: none; }
        
        .history-list { max-height: 200px; overflow-y: auto; border-top: 1px solid #f9f9f9; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
        .hist-amount { font-size: 15px; font-weight: 700; }
        .hist-time { font-size: 10px; color: #bbb; }
        .del-btn { width: 28px; height: 28px; border-radius: 8px; background: #fff1f0; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; }
        
        .chart-box { width: 100%; height: 150px; margin-top: 15px; padding-left: 30px; box-sizing: border-box; }
        .chart-svg { width: 100%; height: 120px; overflow: visible; }
        .axis-label { font-size: 9px; fill: #aaa; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="summary-card">
        <div style="font-size: 11px; opacity: 0.7; margin-bottom: 4px;">NET WORTH / 净资产总额</div>
        <div class="summary-val">¥ <span id="res">0.00</span></div>
    </div>
    <div class="update-time">编辑于：<span id="last-update">从未</span></div>

    <div class="grid">
        <div class="item">
            <div class="label-wrap"><div class="brand-line" style="background:var(--ali)"></div>支付宝</div>
            <div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="alipay" data-name="支付宝" placeholder="0.00"></div>
        </div>
        <div class="item">
            <div class="label-wrap"><div class="brand-line" style="background:var(--wx)"></div>微信支付</div>
            <div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="wechat" data-name="微信" placeholder="0.00"></div>
        </div>
        <div class="item">
            <div class="label-wrap"><div class="brand-line" style="background:var(--ths)"></div>同花顺</div>
            <div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="ths" data-name="同花顺" placeholder="0.00"></div>
        </div>
        <div class="item">
            <div class="label-wrap"><div class="brand-line" style="background:var(--cry)"></div>加密币</div>
            <div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="crypto" data-name="加密币" placeholder="0.00"></div>
        </div>
        <div class="item">
            <div class="label-wrap"><div class="brand-line" style="background:var(--cmb)"></div>招商银行</div>
            <div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="cmb" data-name="招行" placeholder="0.00"></div>
        </div>
        <div class="item">
            <div class="label-wrap"><div class="brand-line" style="background:var(--gjj)"></div>公积金</div>
            <div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="provident" data-name="公积金" placeholder="0.00"></div>
        </div>
    </div>

    <div class="btn-stack">
        <button class="save-btn" onclick="saveRecord()">保存当前资产快照</button>
        <div class="secondary-btns">
            <button class="sec-btn" onclick="document.getElementById('fileIn').click()">
                <svg class="btn-icon" viewBox="0 0 24 24"><path d="M3 7C3 5.8 3.8 5 5 5H9.5L11.5 7H19C20.1 7 21 7.8 21 9V17C21 18.1 20.1 19 19 19H5C3.8 19 3 18.1 3 17V7Z" fill="#0081cc""")/>></svg>导入
            </button>
            <button class="sec-btn" onclick="exportData()">
                <svg class="btn-icon" viewBox="0 0 24 24"><path d="M3 7C3 5.8 3.8 5 5 5H9.5L11.5 7H19C20.1 7 21 7.8 21 9V17C21 18.1 20.1 19 19 19H5C3.8 19 3 18.1 3 17V7Z" fill="#0081cc""")/>></svg>导出
            </button>
        </div>
        <input type="file" id="fileIn" style="display:none" accept=".csv" onchange="importData(this)">
    </div>

    <div class="history-section">
        <div class="history-header">
            <span class="section-title">资产历史轨迹记录</span>
            <button class="clear-all-btn" onclick="clearAllHistory()">清空历史</button>
        </div>
        <div class="history-list" id="hist-list"></div>
        <div class="chart-box" id="chart-wrap" style="display:none;">
            <svg class="chart-svg" id="svg-chart">
                <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1488cc" stop-opacity="0.2""")/>><stop offset="100%" stop-color="#fff" stop-opacity="0""")/>></linearGradient></defs>
                <text x="-32" y="8" class="axis-label" id="y-max"></text>
                <text x="-32" y="120" class="axis-label" id="y-min"></text>
                <text x="0" y="140" class="axis-label" id="x-start"></text>
                <text x="100%" y="140" class="axis-label" text-anchor="end" id="x-end"></text>
                <path fill="url(#g)" id="c-area"></path>
                <path fill="none" stroke="#1488cc" stroke-width="2.5" id="c-line"></path>
            </svg>
        </div>
    </div>
</div>

<script>
    const inputs = document.querySelectorAll('.asset-input');
    const resDisp = document.getElementById('res');
    const timeDisp = document.getElementById('last-update');
    const histList = document.getElementById('hist-list');
    const ASSET_KEYS = ['alipay', 'wechat', 'ths', 'crypto', 'cmb', 'provident'];

    window.onload = () => {
        ASSET_KEYS.forEach(k => {
            const v = localStorage.getItem('v_all_fn_' + k);
            if (v) document.getElementById(k).value = v;
        });
        render();
        update(false);
    };

    function update(shoudTime = true) {
        let sum = 0;
        inputs.forEach(i => sum += (parseFloat(i.value) || 0));
        resDisp.innerText = sum.toLocaleString('zh-CN', {minimumFractionDigits: 2});
        if (shoudTime) timeDisp.innerText = new Date().toLocaleString('zh-CN', {hour12: false});
    }

    function saveRecord() {
        const total = parseFloat(resDisp.innerText.replace(/,/g, ''));
        if (total <= 0) return;
        const now = new Date();
        const fullTime = now.toLocaleString('zh-CN', {hour12: false});
        const day = `${now.getMonth()+1}-${now.getDate()}`;
        
        let detail = {};
        ASSET_KEYS.forEach(k => detail[k] = document.getElementById(k).value || "0");

        let h = JSON.parse(localStorage.getItem('v_all_fn_hist') || "[]");
        h.unshift({amount: total, time: fullTime, day: day, detail: detail});
        localStorage.setItem('v_all_fn_hist', JSON.stringify(h));
        render();
    }

    function render() {
        let h = JSON.parse(localStorage.getItem('v_all_fn_hist') || "[]");
        histList.innerHTML = h.map((r, i) => {
            let diffHtml = "";
            if (i < h.length - 1) {
                const d = r.amount - h[i+1].amount;
                diffHtml = `<span style="font-size:10px; font-weight:700; color:${d>=0?'#2ecc71':'#e74c3c'}; margin-left:6px;">${d>=0?'+':''}${d.toLocaleString()}</span>`;
            }
            return `<div class="history-item">
                <div><div class="hist-amount">¥ ${r.amount.toLocaleString()} ${diffHtml}</div><div class="hist-time">${r.time}</div></div>
                <button class="del-btn" onclick="del(${i})"><svg width="14" height="14" fill="#ff4d4f" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z""")/>></svg></button>
            </div>`;
        }).join('');
        draw(h);
    }

    function draw(h) {
        const box = document.getElementById('chart-wrap');
        if (h.length < 2) { box.style.display='none'; return; }
        box.style.display='block';
        const data = [...h].reverse();
        const vals = data.map(r => r.amount);
        const w = document.getElementById('svg-chart').clientWidth;
        const ht = 120;
        let max = Math.max(...vals), min = Math.min(...vals);
        if (max === min) { max += 100; min -= 100; }
        document.getElementById('y-max').textContent = (max/10000).toFixed(1)+'w';
        document.getElementById('y-min').textContent = (min/10000).toFixed(1)+'w';
        document.getElementById('x-start').textContent = data[0].day;
        document.getElementById('x-end').textContent = data[data.length-1].day;
        const pts = vals.map((v, i) => {
            const x = (i/(vals.length-1)) * w;
            const y = ht - ((v-min)/(max-min)) * ht;
            return `${x},${y}`;
        });
        const d = `M ${pts.join(' L ')}`;
        document.getElementById('c-line').setAttribute('d', d);
        document.getElementById('c-area').setAttribute('d', `${d} L ${w},${ht} L 0,${ht} Z`);
    }

    function exportData() {
        let h = JSON.parse(localStorage.getItem('v_all_fn_hist') || "[]");
        if (!h.length) return alert("暂无数据");
        let csv = "\uFEFF时间,总计," + ASSET_KEYS.map(k => document.getElementById(k).getAttribute('data-name')).join(",") + "\n";
        csv += h.map(r => {
            let row = [r.time, r.amount];
            ASSET_KEYS.forEach(k => row.push(r.detail ? (r.detail[k] || "0") : "0"));
            return row.join(",");
        }).join("\n");
        const b = new Blob([csv], {type: 'text/csv'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(b);
        a.download = `资产备份_${new Date().toLocaleDateString()}.csv`;
        a.click();
    }

    function importData(inp) {
        const file = inp.files[0];
        if (!file) return;
        const r = new FileReader();
        r.onload = function(e) {
            const text = e.target.result;
            const lines = text.split("\n").filter(l => l.trim() !== "");
            let imported = [];
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(",");
                if (cols.length < 2) continue;
                let detail = {};
                ASSET_KEYS.forEach((key, idx) => { detail[key] = cols[idx + 2] ? cols[idx + 2].trim() : "0"; });
                let dateParts = cols[0].split(" ")[0].split(/[\/\-]/);
                imported.push({ amount: parseFloat(cols[1]), time: cols[0].trim(), day: dateParts.slice(1).join("-"), detail: detail });
            }
            if (imported.length > 0) {
                localStorage.setItem('v_all_fn_hist', JSON.stringify(imported));
                if (confirm("导入成功！是否将最新快照数据回填到输入框？")) {
                    const latest = imported[0];
                    ASSET_KEYS.forEach(k => {
                        const val = latest.detail ? latest.detail[k] : "0";
                        document.getElementById(k).value = val;
                        localStorage.setItem('v_all_fn_' + k, val);
                    });
                    update(true);
                }
                render();
            }
        };
        r.readAsText(file);
        inp.value = "";
    }

    function del(idx) {
        if(confirm("确定删除这条记录？")) {
            let h = JSON.parse(localStorage.getItem('v_all_fn_hist') || "[]");
            h.splice(idx, 1);
            localStorage.setItem('v_all_fn_hist', JSON.stringify(h));
            render();
        }
    }

    function clearAllHistory() {
        if(confirm("❗ 警告：确定要永久清空所有历史记录和轨迹图吗？(当前输入框的数据将保留)")) {
            localStorage.removeItem('v_all_fn_hist');
            render();
        }
    }

    inputs.forEach(i => i.addEventListener('input', (e) => {
        let v = e.target.value.replace(/[^\d.]/g, "").replace(/\.(?=.*\.)/g, "");
        e.target.value = v;
        localStorage.setItem('v_all_fn_' + e.target.id, v);
        update(true);
    }));
</script>

</body>
</html>
