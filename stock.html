<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>资产看板专业版 - Ultimate v2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root {
            --bg-main: #0f172a; --bg-card: #1e293b; --bg-table-header: #1e293b;
            --text-main: #f1f5f9; --text-muted: #94a3b8; --border-color: #334155;
            --up-color: #ff5252; --down-color: #00e676; --table-hover: #1e293b;
            --indigo-accent: #6366f1;
        }
        body.light-mode {
            --bg-main: #f8fafc; --bg-card: #ffffff; --bg-table-header: #f1f5f9;
            --text-main: #1e293b; --text-muted: #64748b; --border-color: #e2e8f0;
            --up-color: #dc2626; --down-color: #059669; --table-hover: #f1f5f9;
        }
        body { font-family: 'PingFang SC', sans-serif; background-color: var(--bg-main); color: var(--text-main); transition: 0.3s; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .up { color: var(--up-color) !important; font-weight: bold; } 
        .down { color: var(--down-color) !important; font-weight: bold; } 
        .card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 1rem; }
        .refresh-spin { animation: spin 0.8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .input-box { background: transparent; border-bottom: 1px solid var(--border-color); text-align: right; outline: none; transition: 0.2s; }
        .input-box:focus { border-color: var(--indigo-accent); }
        #refreshProgress { transition: width 1s linear; }
        /* 自定义 tooltip */
        .tooltip-btn {
            position: relative;
        }
        .tooltip-btn:hover::after {
            content: attr(data-tip);
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #f1f5f9;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            white-space: nowrap;
            z-index: 100;
            border: 1px solid #334155;
        }
        .tooltip-btn:hover::before {
            content: '';
            position: absolute;
            bottom: 115%;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: #1e293b;
            z-index: 100;
        }
        body.light-mode .tooltip-btn:hover::after {
            background: #ffffff;
            color: #1e293b;
            border-color: #e2e8f0;
        }
        body.light-mode .tooltip-btn:hover::before {
            border-top-color: #ffffff;
        }
        /* 自动消失提示框 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #f1f5f9;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            z-index: 1000;
            border: 1px solid #334155;
            animation: slideDown 0.3s ease;
        }
        body.light-mode .toast {
            background: #ffffff;
            color: #1e293b;
            border-color: #e2e8f0;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body class="py-6 light-mode text-base">
    <div class="max-w-full mx-auto px-3">

        <!-- 顶部标题和快捷操作 -->
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2">
                <h1 class="text-lg font-black italic tracking-tighter uppercase">资产看板</h1>
                <span class="text-indigo-500 text-xs font-black">PRO</span>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="refreshAllPrices()" class="bg-indigo-600 hover:bg-indigo-500 text-white p-2 rounded-lg transition" title="立即刷新">
                    <svg id="refreshIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path d="M23 4v6h-6M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                </button>
                <button onclick="document.body.classList.toggle('light-mode')" class="p-2 border border-[var(--border-color)] rounded-lg text-xs" title="切换模式">🌓</button>
            </div>
        </div>

        <!-- 顶部统计卡 -->
        <div class="card p-4 mb-4">
            <div class="grid grid-cols-3 gap-4 text-center">
                <div>
                    <div class="text-xs text-[var(--text-muted)] font-black uppercase mb-1">总市值</div>
                    <div id="totalMktDisplay" class="text-lg font-black mono italic">¥ 0</div>
                </div>
                <div>
                    <div class="text-xs text-[var(--text-muted)] font-black uppercase mb-1">今日盈亏</div>
                    <div id="todayProfitDisplay" class="text-lg font-black mono">¥ 0</div>
                </div>
                <div>
                    <div class="text-xs text-[var(--text-muted)] font-black uppercase mb-1">累计盈亏</div>
                    <div id="overallProfitDisplay" class="text-lg font-black mono">¥ 0</div>
                </div>
            </div>
        </div>

        <!-- 待确认交易提示 -->
        <div id="pendingTradeBanner" class="hidden mb-4 bg-amber-500/20 border border-amber-500/30 rounded-xl p-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <span class="text-amber-400">⏰</span>
                    <div class="text-xs">
                        <div class="font-black text-amber-400">有待确认交易</div>
                        <div id="pendingTradeCount" class="text-xs text-[var(--text-muted)]">共 <span class="text-amber-400">0</span> 笔</div>
                    </div>
                </div>
                <button onclick="showPendingTradesModal()" class="bg-amber-600 hover:bg-amber-500 text-white px-3 py-1.5 rounded-lg font-black text-sm">查看</button>
            </div>
        </div>

        <!-- Tab 和操作 -->
        <div class="flex items-center justify-between mb-4">
            <div class="flex p-1 bg-[var(--bg-card)] rounded-xl border border-[var(--border-color)]">
                <button onclick="switchTab('all')" id="tab-all" class="px-4 py-1.5 rounded-lg font-black text-sm bg-indigo-600 text-white">全部</button>
                <button onclick="switchTab('stock')" id="tab-stock" class="px-4 py-1.5 rounded-lg font-black text-sm">股票</button>
                <button onclick="switchTab('fund')" id="tab-fund" class="px-4 py-1.5 rounded-lg font-black text-sm">基金</button>
            </div>
            <div class="flex items-center gap-2">
                <button id="addStockBtn" onclick="addRow({code:'', name:'新股票', shares:0, cost:0, isFund:false})" class="bg-slate-800 text-white px-3 py-1.5 rounded-lg font-black text-sm hover:bg-slate-700 transition">+股</button>
                <button id="addFundBtn" onclick="addRow({code:'', name:'新基金', shares:0, cost:0, isFund:true})" class="bg-indigo-600 text-white px-3 py-1.5 rounded-lg font-black text-sm hover:bg-indigo-500 transition">+基</button>
            </div>
        </div>

        <!-- 净值更新状态 -->
        <div class="text-xs text-[var(--text-muted)] font-black mb-3">
            净值更新: <span id="netValueUpdateStatus" class="text-emerald-400">--</span>
        </div>

        <!-- 卡片列表 -->
        <div id="stockBody" class="space-y-3"></div>

        <!-- 更多操作按钮 -->
        <div class="flex items-center justify-between mt-4 gap-2">
            <button onclick="document.getElementById('importFile').click()" class="flex-1 py-2 border border-[var(--border-color)] rounded-lg text-xs font-black hover:bg-[var(--table-hover)]">导入</button>
            <button onclick="exportCSV()" class="flex-1 py-2 border border-[var(--border-color)] rounded-lg text-xs font-black hover:bg-[var(--table-hover)]">导出</button>
            <button onclick="clearLocalData()" class="flex-1 py-2 border border-rose-500/30 text-rose-400 rounded-lg text-xs font-black hover:bg-rose-500/10">清除数据</button>
            <input type="file" id="importFile" class="hidden" accept=".csv" onchange="importCSV(event)">
        </div>

        <!-- 分页控件 -->
        <div class="flex items-center justify-between mt-3 pb-20">
            <div class="text-xs text-[var(--text-muted)] font-black">
                共 <span id="totalCount" class="text-indigo-400">0</span> 条
            </div>
            <div class="flex items-center gap-2">
                <button onclick="changePage('prev')" class="px-3 py-1 border border-[var(--border-color)] rounded-lg text-xs font-black hover:bg-[var(--table-hover)]" id="prevBtn">上一页</button>
                <span class="text-xs text-[var(--text-muted)] font-black px-2">
                    <span id="currentPage" class="text-indigo-400">1</span>/<span id="totalPages" class="text-indigo-400">1</span>
                </span>
                <button onclick="changePage('next')" class="px-3 py-1 border border-[var(--border-color)] rounded-lg text-xs font-black hover:bg-[var(--table-hover)]" id="nextBtn">下一页</button>
            </div>
        </div>

        <!-- 加仓弹窗 -->
        <div id="addFundModal" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 hidden">
            <div class="bg-[var(--bg-card)] rounded-2xl p-6 max-w-[90vw] w-full mx-4 border border-[var(--border-color)]">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-black">基金加仓</h3>
                    <button onclick="closeAddFundModal()" class="text-[var(--text-muted)] hover:text-white text-2xl">&times;</button>
                </div>
                <div class="space-y-4">
                    <div class="text-sm text-[var(--text-muted)]">
                        <span class="text-indigo-400 font-black" id="modalFundName"></span>
                        <span class="mono ml-2" id="modalFundCode"></span>
                    </div>
                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div class="bg-[var(--bg-main)] p-3 rounded-lg">
                            <div class="text-[var(--text-muted)] text-xs uppercase">当前持仓</div>
                            <div class="mono font-black" id="modalCurrentShares">0 份</div>
                        </div>
                        <div class="bg-[var(--bg-main)] p-3 rounded-lg">
                            <div class="text-[var(--text-muted)] text-xs uppercase">当前成本</div>
                            <div class="mono font-black" id="modalCurrentCost">¥0.000</div>
                        </div>
                    </div>
                    <div class="bg-[var(--bg-main)] p-4 rounded-lg">
                        <div class="text-[var(--text-muted)] text-xs uppercase mb-1">当前净值</div>
                        <div class="mono font-black text-xl text-indigo-400" id="modalNetValue">¥0.000</div>
                    </div>
                    <div>
                        <label class="text-xs font-black text-[var(--text-muted)] uppercase mb-2 block">交易时间</label>
                        <div class="flex gap-2 mb-4">
                            <label class="flex-1 flex items-center justify-center gap-2 p-3 rounded-lg border border-[var(--border-color)] cursor-pointer hover:bg-[var(--bg-table-hover)]">
                                <input type="radio" name="tradeTime" id="tradeTimeBefore" value="before" checked class="accent-indigo-500">
                                <span class="text-sm font-black">15:00前</span>
                            </label>
                            <label class="flex-1 flex items-center justify-center gap-2 p-3 rounded-lg border border-[var(--border-color)] cursor-pointer hover:bg-[var(--bg-table-hover)]">
                                <input type="radio" name="tradeTime" id="tradeTimeAfter" value="after" class="accent-indigo-500">
                                <span class="text-sm font-black">15:00后</span>
                            </label>
                        </div>
                    </div>
                    <div>
                        <label class="text-xs font-black text-[var(--text-muted)] uppercase">加仓金额 (CNY)</label>
                        <input type="number" id="modalAddAmount" class="w-full bg-[var(--bg-main)] border border-[var(--border-color)] rounded-lg p-3 text-right mono font-black text-lg focus:border-indigo-500 outline-none" placeholder="输入加仓金额" oninput="previewAddFund()">
                    </div>
                    <div class="bg-indigo-500/10 p-4 rounded-lg border border-indigo-500/20">
                        <div class="text-xs font-black text-indigo-400 uppercase mb-2">加仓预览</div>
                        <div class="grid grid-cols-2 gap-4 text-sm">
                            <div>
                                <div class="text-[var(--text-muted)] text-xs">新增份额</div>
                                <div class="mono font-black" id="modalNewShares">+0 份</div>
                            </div>
                            <div>
                                <div class="text-[var(--text-muted)] text-xs">总份额</div>
                                <div class="mono font-black" id="modalTotalShares">0 份</div>
                            </div>
                            <div>
                                <div class="text-[var(--text-muted)] text-xs">新成本</div>
                                <div class="mono font-black" id="modalNewCost">¥0.000</div>
                            </div>
                            <div>
                                <div class="text-[var(--text-muted)] text-xs">总成本</div>
                                <div class="mono font-black" id="modalTotalCost">¥0</div>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-3 mt-6">
                        <button onclick="closeAddFundModal()" class="flex-1 py-3 rounded-xl font-black text-sm border border-[var(--border-color)] text-[var(--text-muted)] hover:bg-[var(--bg-table-hover)]">取消</button>
                        <button onclick="confirmAddFund()" class="flex-1 py-3 rounded-xl font-black text-sm bg-indigo-600 hover:bg-indigo-500 text-white">确认加仓</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 减仓弹窗 -->
        <div id="reduceFundModal" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 hidden">
            <div class="bg-[var(--bg-card)] rounded-2xl p-6 max-w-[90vw] w-full mx-4 border border-[var(--border-color)]">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-black">基金减仓</h3>
                    <button onclick="closeReduceFundModal()" class="text-[var(--text-muted)] hover:text-white text-2xl">&times;</button>
                </div>
                <div class="space-y-4">
                    <div class="text-sm text-[var(--text-muted)]">
                        <span class="text-rose-400 font-black" id="reduceModalFundName"></span>
                        <span class="mono ml-2" id="reduceModalFundCode"></span>
                    </div>
                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div class="bg-[var(--bg-main)] p-3 rounded-lg">
                            <div class="text-[var(--text-muted)] text-xs uppercase">当前持仓</div>
                            <div class="mono font-black" id="reduceModalCurrentShares">0 份</div>
                        </div>
                        <div class="bg-[var(--bg-main)] p-3 rounded-lg">
                            <div class="text-[var(--text-muted)] text-xs uppercase">成本价</div>
                            <div class="mono font-black" id="reduceModalCurrentCost">¥0.0000</div>
                        </div>
                    </div>
                    <div class="bg-[var(--bg-main)] p-4 rounded-lg">
                        <div class="text-[var(--text-muted)] text-xs uppercase mb-1">当前净值</div>
                        <div class="mono font-black text-xl text-rose-400" id="reduceModalNetValue">¥0.000</div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-xs font-black text-[var(--text-muted)] uppercase">减仓份额</label>
                            <input type="number" id="reduceModalShares" class="w-full bg-[var(--bg-main)] border border-[var(--border-color)] rounded-lg p-3 text-right mono font-black text-lg focus:border-rose-500 outline-none" placeholder="输入份额" oninput="previewReduceFund()">
                        </div>
                        <div>
                            <label class="text-xs font-black text-[var(--text-muted)] uppercase">减仓比例</label>
                            <select id="reduceModalPercent" class="w-full bg-[var(--bg-main)] border border-[var(--border-color)] rounded-lg p-3 text-right mono font-black text-lg focus:border-rose-500 outline-none" onchange="applyReducePercent()">
                                <option value="">选择</option>
                                <option value="25">1/4 (25%)</option>
                                <option value="33.33">1/3 (33%)</option>
                                <option value="50">1/2 (50%)</option>
                                <option value="66.67">2/3 (67%)</option>
                                <option value="75">3/4 (75%)</option>
                                <option value="100">全部 (100%)</option>
                            </select>
                        </div>
                    </div>
                    <div class="bg-rose-500/10 p-4 rounded-lg border border-rose-500/20">
                        <div class="text-xs font-black text-rose-400 uppercase mb-2">减仓预览</div>
                        <div class="grid grid-cols-2 gap-4 text-sm">
                            <div>
                                <div class="text-[var(--text-muted)] text-xs">剩余份额</div>
                                <div class="mono font-black" id="reduceModalRemainShares">0.00 份</div>
                            </div>
                            <div>
                                <div class="text-[var(--text-muted)] text-xs">赎回金额</div>
                                <div class="mono font-black" id="reduceModalRedeemAmount">¥0</div>
                            </div>
                            <div>
                                <div class="text-[var(--text-muted)] text-xs">持仓成本</div>
                                <div class="mono font-black" id="reduceModalRemainCost">¥0.0000</div>
                            </div>
                            <div>
                                <div class="text-[var(--text-muted)] text-xs">实现盈亏</div>
                                <div class="mono font-black" id="reduceModalRealizedPL">¥0</div>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-3 mt-6">
                        <button onclick="closeReduceFundModal()" class="flex-1 py-3 rounded-xl font-black text-sm border border-[var(--border-color)] text-[var(--text-muted)] hover:bg-[var(--bg-table-hover)]">取消</button>
                        <button onclick="confirmReduceFund()" class="flex-1 py-3 rounded-xl font-black text-sm bg-rose-600 hover:bg-rose-500 text-white">确认减仓</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 待确认交易弹窗 -->
        <div id="pendingTradesModal" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 hidden">
            <div class="bg-[var(--bg-card)] rounded-2xl p-6 max-w-[90vw] w-full mx-4 border border-[var(--border-color)]">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-black">待确认交易</h3>
                    <button onclick="closePendingTradesModal()" class="text-[var(--text-muted)] hover:text-white text-2xl">&times;</button>
                </div>
                <div id="pendingTradesList" class="space-y-3 max-h-[400px] overflow-y-auto"></div>
                <div class="flex gap-3 mt-6">
                    <button onclick="closePendingTradesModal()" class="flex-1 py-3 rounded-xl font-black text-sm border border-[var(--border-color)] text-[var(--text-muted)] hover:bg-[var(--bg-table-hover)]">关闭</button>
                    <button onclick="confirmAllPendingTrades()" class="flex-1 py-3 rounded-xl font-black text-sm bg-emerald-600 hover:bg-emerald-500 text-white">全部确认</button>
                </div>
            </div>
        </div>

        <!-- 交易记录弹窗 -->
        <div id="tradeHistoryModal" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 hidden">
            <div class="bg-[var(--bg-card)] rounded-2xl p-6 max-w-[90vw] w-full mx-4 border border-[var(--border-color)]">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h3 class="text-lg font-black">交易记录</h3>
                        <div class="text-xs text-[var(--text-muted)]" id="tradeHistoryFundName"></div>
                    </div>
                    <button onclick="closeTradeHistoryModal()" class="text-[var(--text-muted)] hover:text-white text-2xl">&times;</button>
                </div>
                <div id="tradeHistoryList" class="space-y-2 max-h-[450px] overflow-y-auto"></div>
                <div class="mt-4 flex gap-3">
                    <button onclick="closeTradeHistoryModal()" class="flex-1 py-3 rounded-xl font-black text-sm border border-[var(--border-color)] text-[var(--text-muted)] hover:bg-[var(--bg-table-hover)]">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 配置 ====================
        const API_BASE_URL = 'https://finance-app-kanh.onrender.com';
        // const API_BASE_URL = 'http://localhost:3000';

        let currentTab = 'all';
        let sortDir = -1;
        let refreshTimer = null;
        let progressInterval = null;
        let remainingSeconds = 0;

        // 分页相关
        let currentPageNum = 1;
        let pageSize = 10;

        // 数据缓存
        let pendingTradesCache = [];
        let localTradeHistory = null;

        function clearZero(input) {
            if (parseFloat(input.value) === 0) {
                input.value = '';
            }
        }

        // 添加卡片
        function addRow(item, prepend = true) {
            const card = document.createElement('div');
            card.dataset.isFund = item.isFund;
            card.dataset.id = item.id || Date.now() + Math.random().toString(36).substr(2, 9);
            card.className = "card p-3";

            const fundBtns = item.isFund
                ? `<button onclick="openTradeHistoryModal(this.closest('[data-id]'))" class="p-1 text-amber-400" title="交易记录">📋</button>
                   <button onclick="openAddFundModal(this.closest('[data-id]'))" class="p-1 text-indigo-400" title="加仓">➕</button>
                   <button onclick="openReduceFundModal(this.closest('[data-id]'))" class="p-1 text-rose-400" title="减仓">➖</button>`
                : '';

            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <div class="flex-1">
                        <div class="stock-name text-sm font-bold mb-1">${item.name || '正在获取...'}</div>
                        <div class="flex items-center gap-1 text-xs mono text-[var(--text-muted)] mb-2">
                            <span class="text-indigo-500 font-black">#</span>
                            <input type="text" class="code-input bg-transparent border-none outline-none focus:text-indigo-500 w-20 uppercase" placeholder="输入代码" value="${item.code || ''}" oninput="handleCodeInput(this)">
                        </div>
                        <div class="grid grid-cols-2 gap-2 text-xs">
                            <div>
                                <span class="text-[var(--text-muted)]">持仓</span>
                                <input type="number" class="shares-input bg-transparent border-b border-[var(--border-color)] w-full mono text-sm outline-none" value="${item.shares || 0}" oninput="saveAndCalculate()" onfocus="clearZero(this)">
                            </div>
                            <div>
                                <span class="text-[var(--text-muted)]">成本</span>
                                <input type="number" class="cost-input bg-transparent border-b border-[var(--border-color)] w-full mono text-sm outline-none" value="${item.cost || 0}" step="0.001" oninput="saveAndCalculate()" onfocus="clearZero(this)">

                        <input type="number" class="alert-input bg-transparent border-b border-[var(--border-color)] text-center mono text-sm w-16 outline-none" value="${item.alert || ''}" placeholder="%提醒" oninput="saveAndCalculate()">

            updatePagination();

                setTimeout(() => {

        // 更新分页显示
        function updatePagination() {
            // 先显示所有卡片
            document.querySelectorAll('#stockBody [data-id]').forEach(card => {
                card.style.display = '';
            });

            // 获取所有卡片，按 tab 筛选
            const allCards = Array.from(document.querySelectorAll('#stockBody [data-id]'));
            let filteredCards = allCards.filter(card => {
                const isF = card.dataset.isFund === 'true';
                if (currentTab === 'all') return true;
                if (currentTab === 'stock') return !isF;
                if (currentTab === 'fund') return isF;
                return true;
            });

            const totalCount = filteredCards.length;
            const totalPages = Math.max(1, Math.ceil(totalCount / pageSize));
            if (currentPageNum > totalPages) currentPageNum = totalPages;

            const startIndex = (currentPageNum - 1) * pageSize;
            const endIndex = startIndex + pageSize;

            // 控制哪些卡片显示
            allCards.forEach(card => {
                const isF = card.dataset.isFund === 'true';
                const inTab = (currentTab === 'all') ||
                             (currentTab === 'stock' && !isF) ||
                             (currentTab === 'fund' && isF);

                if (!inTab) {
                    card.style.display = 'none';
                } else {
                    const idx = filteredCards.indexOf(card);
                    if (idx >= startIndex && idx < endIndex) {
                        card.style.display = '';
                    } else {
                        card.style.display = 'none';
                    }
                }
            });

            // 更新分页控件
            document.getElementById('totalCount').textContent = totalCount;
            document.getElementById('currentPage').textContent = currentPageNum;
            document.getElementById('totalPages').textContent = totalPages;
            document.getElementById('prevBtn').disabled = currentPageNum <= 1;
            document.getElementById('nextBtn').disabled = currentPageNum >= totalPages;
        }

        // 切换页
        function changePage(direction) {
            const allCards = Array.from(document.querySelectorAll('#stockBody [data-id]'));
            let filteredCards = allCards.filter(card => {
                const isF = card.dataset.isFund === 'true';
                if (currentTab === 'all') return true;
                if (currentTab === 'stock') return !isF;
                if (currentTab === 'fund') return isF;
                return true;
            });

            const totalPages = Math.max(1, Math.ceil(filteredCards.length / pageSize));

            if (direction === 'prev' && currentPageNum > 1) {
                currentPageNum--;
            } else if (direction === 'next' && currentPageNum < totalPages) {
                currentPageNum++;
            }
            updatePagination();
        }

        // 改变每页条数
        function changePageSize(size) {
            pageSize = parseInt(size);
            currentPageNum = 1;
            updatePagination();
        }

        function handleCodeInput(el) {
            const code = el.value.trim();
            const card = el.closest('[data-id]');
            const cardId = card.dataset.id;
            const isF = card.dataset.isFund === 'true';

            if (code.length >= 5) {
                // 检查是否重复
                const existingCards = Array.from(document.querySelectorAll('#stockBody [data-id]'));
                const duplicate = existingCards.find(r => {
                    if (r.dataset.id === cardId) return false; // 排除自己
                    const rCode = r.querySelector('.code-input')?.value?.trim();
                    const rIsF = r.dataset.isFund === 'true';
                    return rCode === code && rIsF === isF;
                });

                if (duplicate) {
                    const dupName = duplicate.querySelector('.stock-name')?.innerText || '该标的';
                    showToast(`⚠️ ${dupName} (#${code}) 已存在！`);
                }

                fetchPrice(card, code);
            }
        }

        function fetchPrice(card, code) {
            const isF = card.dataset.isFund === 'true';
            let sym = code.length === 5 ? 'hk' + code : (isF ? 'jj' + code : ((/^[569]/.test(code)) ? 'sh' + code : 'sz' + code));

            const apiType = isF ? 's_' : 's_';
            const vn = "v_" + apiType + sym;
            const s = document.createElement('script');
            s.src = `https://qt.gtimg.cn/q=${apiType}${sym}&_=${Math.random()}`;
            s.onload = function() {
                if (window[vn]) {
                    const d = window[vn].split('~');
                    card.querySelector('.stock-name').innerText = d[1].replace('[基金] ', '');

                    let priceText = '¥' + parseFloat(d[3]).toFixed(3);
                    let priceDate = '';

                    if (isF) {
                        // 搜索所有字段查找日期格式 (YYYYMMDD 或 YYYY-MM-DD)
                        for (let i = 0; i < d.length; i++) {
                            if (d[i] && /^\d{4}[-]?\d{2}[-]?\d{2}$/.test(d[i])) {
                                priceDate = d[i].replace(/-/g, '');
                                break;
                            }
                        }

                        // QDII 境外基金特殊处理：日期 +1 天
                        if (code === '017145' || code === '017437') {
                            if (priceDate && priceDate.length === 8) {
                                const year = parseInt(priceDate.substr(0, 4));
                                const month = parseInt(priceDate.substr(4, 2)) - 1;
                                const day = parseInt(priceDate.substr(6, 2));
                                const date = new Date(year, month, day);
                                date.setDate(date.getDate() + 1);
                                const y = date.getFullYear();
                                const m = (date.getMonth() + 1).toString().padStart(2, '0');
                                const d = date.getDate().toString().padStart(2, '0');
                                priceDate = `${y}${m}${d}`;
                            }
                        }

                        const now = new Date();
                        const todayStr = now.getFullYear().toString() +
                                         (now.getMonth() + 1).toString().padStart(2, '0') +
                                         now.getDate().toString().padStart(2, '0');

                        const yesterday = new Date(now);
                        yesterday.setDate(yesterday.getDate() - 1);
                        const yesterdayStr = yesterday.getFullYear().toString() +
                                              (yesterday.getMonth() + 1).toString().padStart(2, '0') +
                                              yesterday.getDate().toString().padStart(2, '0');

                        const dayBefore = new Date(now);
                        dayBefore.setDate(dayBefore.getDate() - 2);
                        const dayBeforeStr = dayBefore.getFullYear().toString() +
                                              (dayBefore.getMonth() + 1).toString().padStart(2, '0') +
                                              dayBefore.getDate().toString().padStart(2, '0');

                        const hour = now.getHours();
                        const minute = now.getMinutes();
                        let showUpdated = false;
                        let labelText = '已更新';

                        // 判断是否是交易日的上午（9:30-15:00）
                        const isTradingMorning = (hour > 9 || (hour === 9 && minute >= 30)) && hour < 15;

                        if (priceDate) {
                            if (priceDate === todayStr) {
                                // 今天的数据
                                showUpdated = true;
                                labelText = '已更新';
                            } else if (priceDate === yesterdayStr) {
                                // 昨天的数据
                                if (isTradingMorning) {
                                    // 交易日上午（9:30-15:00）：昨天的数据算未更新
                                    showUpdated = false;
                                    labelText = '待更新';
                                } else {
                                    // 其他时间：15点前算已更新，15点后显示昨日净值
                                    showUpdated = hour < 15;
                                    labelText = hour < 15 ? '已更新' : '昨日净值';
                                }
                            } else if (priceDate === dayBeforeStr) {
                                // 前天的数据（周末或节假日）
                                showUpdated = true;
                                labelText = '已更新';
                            }
                        }

                        if (showUpdated) {
                            priceText += `<span class="text-emerald-400 text-xs font-black ml-1">${labelText}</span>`;
                        } else if (priceDate) {
                            priceText += `<span class="text-amber-400 text-xs font-black ml-1">待更新</span>`;
                        }
                        card.dataset.isTodayUpdated = showUpdated ? '1' : '0';
                    }

                    card.querySelector('.price-cell').innerHTML = priceText;
                    card.dataset.price = d[3]; card.dataset.change = d[5] || 0;
                    card.dataset.priceDate = priceDate || '';
                    saveAndCalculate();
                    updateNetValueStatus();
                }
                document.body.removeChild(s); delete window[vn];
            };
            document.body.appendChild(s);
        }

        function updateNetValueStatus() {
            const allCards = Array.from(document.querySelectorAll('#stockBody [data-id]'));
            const fundCards = allCards.filter(r => r.dataset.isFund === 'true');

            if (fundCards.length === 0) {
                document.getElementById('netValueUpdateStatus').textContent = '--';
                return;
            }

            let updatedCount = 0;
            fundCards.forEach(card => {
                if (card.dataset.isTodayUpdated === '1') {
                    updatedCount++;
                }
            });

            const statusEl = document.getElementById('netValueUpdateStatus');
            if (updatedCount === fundCards.length) {
                statusEl.textContent = '已全部更新';
                statusEl.className = 'text-emerald-400';
            } else {
                statusEl.textContent = `${updatedCount}/${fundCards.length}`;
                statusEl.className = 'text-amber-400';
            }
        }

        function saveAndCalculate() {
            const cards = Array.from(document.querySelectorAll('#stockBody [data-id]'));
            // 移动端没有这些输入框，使用默认值
            const baseInput = 300000;
            const fx = 0.91;
            const refreshVal = "0";

            let totalMkt = 0, totalToday = 0, totalOverall = 0, totalPlan = 0;
            let stockMkt = 0, stockToday = 0, stockOverall = 0;
            let fundMkt = 0, fundToday = 0, fundOverall = 0;

            const items = cards.map(card => {
                const code = card.querySelector('.code-input').value;
                const shares = parseFloat(card.querySelector('.shares-input').value) || 0;
                const cost = parseFloat(card.querySelector('.cost-input').value) || 0;
                const price = parseFloat(card.dataset.price) || 0;
                const change = parseFloat(card.dataset.change) || 0;
                const planBuy = parseFloat(card.querySelector('.plan-buy-input').value) || 0;
                const targetPrice = parseFloat(card.querySelector('.target-price-input').value) || '';
                const isF = card.dataset.isFund === 'true';

                const rate = (code.length === 5) ? fx : 1;
                const mkt = shares * price * rate;
                const profit = (price - cost) * shares * rate;

                // 判断今日净值是否已更新
                let today = 0;
                let displayChange = 0;

                if (!isF) {
                    // 股票 → 正常计算
                    today = mkt * (change / 100);
                    displayChange = change;
                } else {
                    // 基金：判断净值日期
                    const priceDate = card.dataset.priceDate || '';
                    const now = new Date();
                    const todayStr = now.getFullYear().toString() +
                                     (now.getMonth() + 1).toString().padStart(2, '0') +
                                     now.getDate().toString().padStart(2, '0');
                    const yesterday = new Date(now);
                    yesterday.setDate(yesterday.getDate() - 1);
                    const yesterdayStr = yesterday.getFullYear().toString() +
                                         (yesterday.getMonth() + 1).toString().padStart(2, '0') +
                                         yesterday.getDate().toString().padStart(2, '0');
                    const hour = now.getHours();
                    const minute = now.getMinutes();

                    // 判断是否是交易日的上午（9:30-15:00）
                    const isTradingMorning = (hour > 9 || (hour === 9 && minute >= 30)) && hour < 15;

                    let isTodayUpdated = false;
                    if (priceDate === todayStr) {
                        isTodayUpdated = true;
                    } else if (priceDate === yesterdayStr) {
                        if (isTradingMorning) {
                            // 交易日上午（9:30-15:00）：昨天的数据算未更新
                            isTodayUpdated = false;
                        } else {
                            // 其他时间：15点前算已更新
                            isTodayUpdated = hour < 15;
                        }
                    }

                    if (isTodayUpdated) {
                        today = mkt * (change / 100);
                        displayChange = change;
                    } else {
                        today = 0;
                        displayChange = 0;
                    }
                }

                if (isF) {
                    fundMkt += mkt;
                    fundToday += today;
                    fundOverall += profit;
                } else {
                    stockMkt += mkt;
                    stockToday += today;
                    stockOverall += profit;
                }

                totalMkt += mkt; totalToday += today; totalOverall += profit; totalPlan += planBuy;
                card.dataset.mktVal = mkt;

                card.querySelector('.mkt-val-cell').innerText = '¥' + Math.round(mkt).toLocaleString();
                card.querySelector('.today-profit-cell').innerText = (today>=0?'+':'') + Math.round(today).toLocaleString();
                card.querySelector('.today-profit-cell').className = 'today-profit-cell mono text-sm ' + (today>=0?'up':'down');
                card.querySelector('.chg-pct-cell').innerText = (displayChange>=0?'+':'') + displayChange.toFixed(2) + '%';
                card.querySelector('.chg-pct-cell').className = 'chg-pct-cell text-xs font-bold ' + (displayChange>=0?'up':'down');
                card.querySelector('.overall-profit-cell').innerText = (profit>=0?'+':'') + Math.round(profit).toLocaleString();
                card.querySelector('.overall-profit-cell').className = 'overall-profit-cell mono text-sm ' + (profit>=0?'up':'down');
                const ratio = cost > 0 ? ((price-cost)/cost*100).toFixed(2) : 0;
                card.querySelector('.ratio-cell').innerText = (ratio>=0?'+':'') + ratio + '%';
                card.querySelector('.ratio-cell').className = 'ratio-cell text-xs font-bold ' + (ratio>=0?'up':'down');

                // 目标价格收益计算
                const targetProfitEl = card.querySelector('.target-profit-cell');
                const targetRatioEl = card.querySelector('.target-ratio-cell');
                if (targetPrice && targetPrice > 0 && shares > 0 && cost > 0) {
                    const targetProfit = (targetPrice - cost) * shares * rate;
                    const targetRatio = cost > 0 ? ((targetPrice - cost) / cost * 100).toFixed(2) : 0;
                    targetProfitEl.innerText = (targetProfit >= 0 ? '+' : '') + Math.round(targetProfit).toLocaleString();
                    targetProfitEl.className = 'target-profit-cell mono font-bold text-emerald-400 ' + (targetProfit >= 0 ? 'up' : 'down');
                    targetRatioEl.innerText = (targetRatio >= 0 ? '+' : '') + targetRatio + '%';
                    targetRatioEl.className = 'target-ratio-cell text-xs font-bold opacity-80 ' + (targetRatio >= 0 ? 'up' : 'down');
                } else {
                    targetProfitEl.innerText = '--';
                    targetProfitEl.className = 'target-profit-cell mono font-bold text-emerald-400';
                    targetRatioEl.innerText = '--';
                    targetRatioEl.className = 'target-ratio-cell text-xs font-bold opacity-80';
                }

                const alert = parseFloat(card.querySelector('.alert-input').value) || '';
                return { id: card.dataset.id, code, name: card.querySelector('.stock-name').innerText, shares, cost, isFund: isF, planBuy, targetPrice, alert };
            });

            // 决定顶部显示哪一组数据
            let dMkt = totalMkt, dToday = totalToday, dOverall = totalOverall;
            if (currentTab === 'stock') { dMkt = stockMkt; dToday = stockToday; dOverall = stockOverall; }
            if (currentTab === 'fund') { dMkt = fundMkt; dToday = fundToday; dOverall = fundOverall; }

            // 移动端没有这些元素，安全检查
            const totalMktEl = document.getElementById('totalMktDisplay');
            const todayProfitEl = document.getElementById('todayProfitDisplay');
            const overallProfitEl = document.getElementById('overallProfitDisplay');

            if (totalMktEl) totalMktEl.innerText = '¥' + Math.round(dMkt).toLocaleString();
            if (todayProfitEl) {
                todayProfitEl.innerText = (dToday>=0?'+':'') + Math.round(dToday).toLocaleString();
                todayProfitEl.className = 'text-lg font-black mono ' + (dToday>=0?'up':'down');
            }
            if (overallProfitEl) {
                overallProfitEl.innerText = (dOverall>=0?'+':'') + Math.round(dOverall).toLocaleString();
                overallProfitEl.className = 'text-lg font-black mono ' + (dOverall>=0?'up':'down');
            }

            localStorage.setItem('vDashboard_Final_Stable', JSON.stringify({ baseInput, fx, items, refreshVal }));
            updateNetValueStatus();
        }

        async function saveRow(el) {
            const code = el.querySelector('.code-input').value;
            const shares = parseFloat(el.querySelector('.shares-input').value) || 0;
            const cost = parseFloat(el.querySelector('.cost-input').value) || 0;
            const planBuy = parseFloat(el.querySelector('.plan-buy-input').value) || 0;
            const targetPrice = parseFloat(el.querySelector('.target-price-input').value) || '';
            const alert = parseFloat(el.querySelector('.alert-input').value) || '';
            const isFund = el.dataset.isFund === 'true';
            const name = el.querySelector('.stock-name').innerText;
            const id = el.dataset.id;

            const rowData = { id, code, name, shares, cost, isFund, planBuy, targetPrice, alert };

            try {
                const response = await fetch(`${API_BASE_URL}/api/save-row`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(rowData)
                });
                const result = await response.json();
                if (result.success) {
                    el.style.backgroundColor = 'rgba(16, 185, 129, 0.2)';
                    setTimeout(() => el.style.backgroundColor = '', 500);
                }
            } catch (e) {
                console.error('保存失败:', e);
                el.style.backgroundColor = 'rgba(239, 68, 68, 0.2)';
                setTimeout(() => el.style.backgroundColor = '', 500);
            }
        }

        async function deleteRow(el) {
            if (!confirm('确定要删除这条记录吗？')) {
                return;
            }

            const id = el.dataset.id;
            const code = el.querySelector('.code-input')?.value || '';
            const isFund = el.dataset.isFund === 'true';

            try {
                const response = await fetch(`${API_BASE_URL}/api/delete-row`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, code, isFund })
                });
                const result = await response.json();
                if (result.success) {
                    // 从 DOM 移除
                    el.remove();

                    // 同步更新本地 localStorage
                    const localData = JSON.parse(localStorage.getItem('vDashboard_Final_Stable'));
                    if (localData && localData.items) {
                        localData.items = localData.items.filter(item => {
                            if (code && item.code === code && item.isFund === isFund) {
                                return false;
                            }
                            if (item.id === id) {
                                return false;
                            }
                            return true;
                        });
                        localStorage.setItem('vDashboard_Final_Stable', JSON.stringify(localData));
                    }

                    updatePagination();
                    saveAndCalculate();
                    showToast('删除成功');
                }
            } catch (e) {
                console.error('删除失败:', e);
                el.style.backgroundColor = 'rgba(239, 68, 68, 0.2)';
                setTimeout(() => el.style.backgroundColor = '', 500);
            }
        }

        async function saveAllFunds() {
            const btn = document.getElementById('saveAllFundsBtn');
            if (!btn) return; // 移动端没有这个按钮
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = '保存中...';

            const cards = Array.from(document.querySelectorAll('#stockBody [data-id]'));
            const fundCards = cards.filter(r => r.dataset.isFund === 'true');

            let successCount = 0;
            let failCount = 0;

            for (const card of fundCards) {
                const code = card.querySelector('.code-input').value;
                if (!code) continue;

                const shares = parseFloat(card.querySelector('.shares-input').value) || 0;
                const cost = parseFloat(card.querySelector('.cost-input').value) || 0;
                const planBuy = parseFloat(card.querySelector('.plan-buy-input').value) || 0;
                const alert = parseFloat(card.querySelector('.alert-input').value) || '';
                const name = card.querySelector('.stock-name').innerText;
                const id = card.dataset.id;

                const rowData = { id, code, name, shares, cost, isFund: true, planBuy, alert };

                try {
                    const response = await fetch(`${API_BASE_URL}/api/save-row`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(rowData)
                    });
                    const result = await response.json();
                    if (result.success) {
                        successCount++;
                        card.style.backgroundColor = 'rgba(16, 185, 129, 0.2)';
                    } else {
                        failCount++;
                        card.style.backgroundColor = 'rgba(239, 68, 68, 0.2)';
                    }
                } catch (e) {
                    failCount++;
                    card.style.backgroundColor = 'rgba(239, 68, 68, 0.2)';
                }
            }

            setTimeout(() => {
                fundCards.forEach(card => card.style.backgroundColor = '');
            }, 800);

            btn.disabled = false;
            btn.innerText = originalText;
            showToast(`保存完成：成功 ${successCount} 条，失败 ${failCount} 条`);
        }

        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        function setupAutoRefresh() {
            const selectEl = document.getElementById('autoRefreshSelect');
            if (!selectEl) return; // 移动端没有这个元素
            const seconds = parseInt(selectEl.value);
            clearInterval(refreshTimer);
            clearInterval(progressInterval);
            const progressEl = document.getElementById('refreshProgress');
            if (progressEl) progressEl.style.width = '0%';

            if (seconds > 0) {
                remainingSeconds = seconds;
                progressInterval = setInterval(() => {
                    remainingSeconds--;
                    const width = ((seconds - remainingSeconds) / seconds) * 100;
                    if (progressEl) progressEl.style.width = width + '%';
                    if (remainingSeconds <= 0) {
                        refreshAllPrices();
                        remainingSeconds = seconds;
                    }
                }, 1000);
            }

            const amount = parseFloat(document.getElementById('modalAddAmount').value) || 0;
            if (!currentAddFundRow || amount <= 0) return;

            const { shares, cost, price, code, name, rowId } = currentAddFundData;
            if (price <= 0) {

                return;

            const isBefore15 = document.getElementById('tradeTimeBefore').checked;
            const now = new Date();
            const priceDate = currentAddFundRow.dataset.priceDate || '';

            // 获取今天的日期字符串 YYYYMMDD
            const todayStr = now.getFullYear().toString() +
                            (now.getMonth() + 1).toString().padStart(2, '0') +
                            now.getDate().toString().padStart(2, '0');

            const isTodayNetValue = priceDate === todayStr;

            if (!isBefore15) {
                // 选择15点后：总是保存为待确认交易
                const pendingTrades = await getPendingTrades();
                pendingTrades.push({
                    id: Date.now().toString() + Math.random().toString(36).substr(2, 9),
                    rowId: rowId,
                    code: code,
                    name: name,
                    amount: amount,
                    createdAt: now.toISOString()

                await updatePendingTradeBanner();
                closeAddFundModal();
                alert('已提交待确认交易，请在合适的时间确认！');

                const totalShares = shares + newShares;

                    shares: newShares,
                    netValue: price,
                    createdAt: now.toISOString()
                });

                closeAddFundModal();

                pendingTrades.push({

            try {
                const response = await fetch(`${API_BASE_URL}/api/trade-history`);
                const data = await response.json();
                if (data.success && data.history) {
                    localTradeHistory = data.history;
                }
            } catch (e) {
                console.error('从后端同步交易历史失败:', e);
                localTradeHistory = {};
            }
        }

        // 获取交易历史（优先使用缓存）
        async function getTradeHistory() {
            if (!localTradeHistory) {
                await syncTradeHistoryFromServer();
            }
            return localTradeHistory || {};
        }

        // 保存交易历史到后端
        async function saveTradeHistory(history) {
            localTradeHistory = history;
            try {
                const response = await fetch(`${API_BASE_URL}/api/save-trade-history`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ history })
                });
                await response.json();
            } catch (e) {
                console.error('保存交易历史失败:', e);
            }
        }

        async function addTradeRecord(rowId, record) {
            const history = await getTradeHistory();
            if (!history[rowId]) history[rowId] = [];
            history[rowId].unshift(record);
            await saveTradeHistory(history);
        }

        async function openTradeHistoryModal(row) {
            if (row.dataset.isFund !== 'true') return;

            currentTradeHistoryRowId = row.dataset.id;
            const name = row.querySelector('.stock-name').innerText;
            const code = row.querySelector('.code-input').value;

            document.getElementById('tradeHistoryFundName').innerText = `${name} (#${code})`;

            const history = await getTradeHistory();
            const pendingTrades = (await getPendingTrades()).filter(t => t.rowId === currentTradeHistoryRowId);
            const records = history[currentTradeHistoryRowId] || [];

            const listEl = document.getElementById('tradeHistoryList');

            if (records.length === 0 && pendingTrades.length === 0) {
                listEl.innerHTML = '<div class="text-center text-[var(--text-muted)] py-8">暂无交易记录</div>';
            } else {
                let html = '';

                // 先显示待确认交易
                pendingTrades.forEach(trade => {
                    const date = new Date(trade.createdAt);
                    const dateStr = `${date.getFullYear()}-${(date.getMonth() + 1).toString().padStart(2, '0')}-${date.getDate().toString().padStart(2, '0')} ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
                    html += `
                        <div class="bg-amber-500/10 p-4 rounded-lg border border-amber-500/30">
                            <div class="flex justify-between items-start">
                                <div>
                                    <div class="flex items-center gap-2">
                                        <span class="text-amber-400 font-black">加仓</span>
                                        <span class="bg-amber-500/30 text-amber-400 px-2 py-0.5 rounded text-xs font-black">待确认</span>
                                    </div>
                                    <div class="text-xs text-[var(--text-muted)] mt-1">${dateStr}</div>
                                </div>
                                <div class="text-right">
                                    <div class="mono font-black text-amber-400">+¥${Math.round(trade.amount).toLocaleString()}</div>
                                </div>
                            </div>
                            <div class="mt-2 flex gap-2">
                                <button onclick="confirmPendingTradeFromHistory('${trade.id}')" class="flex-1 py-1.5 rounded-lg font-black text-sm bg-emerald-600 hover:bg-emerald-500 text-white">确认</button>
                                <button onclick="deletePendingTradeFromHistory('${trade.id}')" class="flex-1 py-1.5 rounded-lg font-black text-sm border border-[var(--border-color)] text-[var(--text-muted)] hover:bg-[var(--bg-table-hover)]">删除</button>
                            </div>
                        </div>
                    `;
                });

                // 再显示已确认交易
                records.forEach(record => {
                    const date = new Date(record.createdAt);
                    const dateStr = `${date.getFullYear()}-${(date.getMonth() + 1).toString().padStart(2, '0')}-${date.getDate().toString().padStart(2, '0')} ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
                    const isAdd = record.type === 'add';
                    const colorClass = isAdd ? 'text-indigo-400' : 'text-rose-400';
                    const bgClass = isAdd ? 'bg-indigo-500/10 border-indigo-500/20' : 'bg-rose-500/10 border-rose-500/20';

                    html += `
                        <div class="p-4 rounded-lg border ${bgClass}">
                            <div class="flex justify-between items-start">
                                <div>
                                    <div class="flex items-center gap-2">
                                        <span class="font-black ${colorClass}">${isAdd ? '加仓' : '减仓'}</span>
                                        <span class="bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded text-xs font-black">已确认</span>
                                    </div>
                                    <div class="text-xs text-[var(--text-muted)] mt-1">成交时间: ${dateStr}</div>
                                    <div class="text-xs text-[var(--text-muted)]">成交净值: ¥${record.netValue?.toFixed(3) || '-'}</div>
                                </div>
                                <div class="text-right">
                                    <div class="mono font-black ${colorClass}">${isAdd ? '+' : '-'}${record.shares?.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) || '-'} 份</div>
                                    <div class="text-xs text-[var(--text-muted)]">${isAdd ? '+' : '-'}¥${Math.round(record.amount || 0).toLocaleString()}</div>
                                </div>
                            </div>
                        </div>
                    `;
                });

                listEl.innerHTML = html;
            }

            document.getElementById('tradeHistoryModal').classList.remove('hidden');
        }

        function closeTradeHistoryModal() {
            document.getElementById('tradeHistoryModal').classList.add('hidden');
            currentTradeHistoryRowId = null;
        }

        async function confirmPendingTradeFromHistory(tradeId) {
            await confirmPendingTrade(tradeId);
            if (currentTradeHistoryRowId) {
                const card = document.querySelector(`[data-id="${currentTradeHistoryRowId}"]`);
                if (card) await openTradeHistoryModal(card);
            }
        }

        async function deletePendingTradeFromHistory(tradeId) {
            await deletePendingTrade(tradeId);
            if (currentTradeHistoryRowId) {
                const card = document.querySelector(`[data-id="${currentTradeHistoryRowId}"]`);
                if (card) await openTradeHistoryModal(card);
            }
        }
    </script>
</body>
</html>
