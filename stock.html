<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>投资管理 Pro - 数据同步版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        input:focus { outline: none; border-bottom: 2px solid #6366f1; transition: 0.2s; }
        .up { color: #f43f5e; } 
        .down { color: #10b981; } 
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .card { background: white; padding: 1.2rem; border-radius: 1rem; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .fund-star { color: #3b82f6; margin-right: 4px; font-style: normal; }
        .refresh-spin { animation: spin 0.8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .btn-interact { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-interact:hover { transform: translateY(-1px); }
        .dot-blink { animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .sortable { cursor: pointer; transition: background 0.2s; }
        .sortable:hover { background: #f8fafc; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-8 text-slate-800">

    <div class="max-w-[1600px] mx-auto px-6">
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-8">
            <div class="card bg-white border-t-4 border-t-slate-800">
                <div class="flex justify-between items-start">
                    <div class="text-slate-400 text-[10px] mb-1 font-bold uppercase tracking-wider">资产总值 (CNY)</div>
                    <div id="autoStatus" class="flex items-center gap-1.5 text-[9px] font-bold text-slate-300">
                        <span class="w-2 h-2 rounded-full bg-slate-300"></span> 待命
                    </div>
                </div>
                <div id="totalAssets" class="text-xl font-bold mono italic mb-2">¥ 0.00</div>
                <div class="flex items-center gap-2 pt-2.5 border-t border-slate-50">
                    <div class="flex-1 min-w-0">
                        <div class="text-[10px] text-slate-400 font-bold mb-0.5">股票市值</div>
                        <div id="stockMktTotal" class="text-[13px] font-black text-slate-700 mono truncate">¥ 0</div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="text-[10px] text-blue-400 font-bold mb-0.5">基金市值</div>
                        <div id="fundMktTotal" class="text-[13px] font-black text-blue-600 mono truncate">¥ 0</div>
                    </div>
                </div>
            </div>

            <div class="card border-t-4 border-t-rose-500 bg-rose-50/30 relative group">
                <div class="flex justify-between items-center mb-1">
                    <div class="text-rose-600 text-[10px] font-bold uppercase tracking-wider">今日预估盈亏</div>
                    <button onclick="syncDailyData()" id="syncBtn" class="p-1 rounded-md hover:bg-rose-100 text-rose-400 transition-all title='同步数据到本地存储'">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                    </button>
                </div>
                <div id="todayTotalProfit" class="text-xl font-bold mono mb-2">¥ 0.00</div>
                <div class="flex items-center gap-2 pt-2.5 border-t border-rose-100/50">
                    <div class="flex-1 min-w-0">
                        <div class="text-[10px] text-rose-400 font-bold mb-0.5">股票今日</div>
                        <div id="stockTodayP" class="text-[13px] font-black mono truncate">¥ 0</div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="text-[10px] text-rose-400 font-bold mb-0.5">基金今日</div>
                        <div id="fundTodayP" class="text-[13px] font-black mono truncate">¥ 0</div>
                    </div>
                </div>
            </div>

            <div class="card border-t-4 border-t-indigo-500 bg-indigo-50/30">
                <div class="text-indigo-600 text-[10px] mb-1 font-bold uppercase tracking-wider">累计持仓盈亏</div>
                <div id="totalProfit" class="text-xl font-bold mono mb-2">¥ 0.00</div>
                <div class="flex items-center gap-2 pt-2.5 border-t border-indigo-100/50">
                    <div class="flex-1 min-w-0">
                        <div class="text-[10px] text-indigo-400 font-bold mb-0.5">股票累计</div>
                        <div id="stockTotalP" class="text-[13px] font-black mono truncate">¥ 0</div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="text-[10px] text-indigo-400 font-bold mb-0.5">基金累计</div>
                        <div id="fundTotalP" class="text-[13px] font-black mono truncate">¥ 0</div>
                    </div>
                </div>
            </div>

            <div class="card bg-emerald-50 border-emerald-100 border-t-4 border-t-emerald-500 text-center">
                <div class="text-emerald-600 text-[10px] mb-1 font-bold uppercase tracking-wider">初始可用现金</div>
                <input type="number" id="cashInput" value="50000" class="bg-transparent text-xl font-bold text-emerald-700 w-full text-center mono" oninput="saveAndCalculate()">
                <div class="text-[10px] text-emerald-400 mt-2.5 pt-2 border-t border-emerald-100 font-bold uppercase italic tracking-tighter">Initial Cap</div>
            </div>

            <div class="card bg-orange-50 border-orange-100 border-t-4 border-t-orange-500 text-center">
                <div class="text-orange-600 text-[10px] mb-1 font-bold uppercase tracking-wider">闲置/可用现金</div>
                <div id="remainingCash" class="text-xl font-bold text-orange-700 mono text-center">¥ 0.00</div>
                <div class="text-[10px] text-orange-400 mt-2.5 pt-2 border-t border-orange-100 font-bold uppercase italic tracking-tighter">Liquid Cash</div>
            </div>
        </div>

        <div class="flex justify-between items-center mb-6 px-2">
            <div class="flex items-center gap-6">
                <h2 class="text-xl font-black text-slate-800 tracking-tighter flex items-center italic">
                    <span class="w-2 h-6 bg-slate-800 rounded-full mr-3 italic-none"></span>
                    STOCKS & FUNDS
                </h2>
                <div class="flex gap-4 text-[11px] text-slate-400 font-medium bg-white px-4 py-1.5 rounded-full border border-slate-100 shadow-inner items-center">
                    <div class="flex items-center">
                        <span>1 HKD = </span>
                        <input type="number" id="hkdRateInput" value="0.88" step="0.001" class="w-14 bg-transparent text-indigo-600 font-bold text-center outline-none" oninput="saveAndCalculate()">
                        <span>CNY</span>
                    </div>
                    <span class="text-slate-200">|</span>
                    <div class="flex items-center gap-2">
                        <span>频率:</span>
                        <select id="refreshInterval" class="bg-transparent font-bold text-indigo-600 outline-none cursor-pointer" onchange="resetAutoRefresh()">
                            <option value="0">手动</option>
                            <option value="1" selected>1 min</option>
                            <option value="5">5 min</option>
                        </select>
                    </div>
                    <span class="text-slate-200">|</span>
                    <span id="countdownLabel" class="font-bold text-indigo-400 min-w-[70px]">待命</span>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="exportCSV()" class="btn-interact text-xs font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 px-5 py-2.5 rounded-xl border border-slate-200/50">导出备份</button>
                <label class="btn-interact text-xs font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 px-5 py-2.5 rounded-xl cursor-pointer border border-slate-200/50">
                    导入恢复<input type="file" id="importFile" class="hidden" accept=".csv" onchange="importCSV(this)">
                </label>
                <button onclick="refreshAllPrices()" id="refreshBtn" class="btn-interact flex items-center gap-2 bg-white border border-indigo-200 text-indigo-600 px-6 py-2.5 rounded-xl hover:bg-indigo-50 font-bold text-sm ml-2">
                    <svg id="refreshIcon" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                    立即刷新
                </button>
                <button onclick="addRow()" class="btn-interact bg-indigo-600 text-white px-6 py-2.5 rounded-xl hover:bg-indigo-700 shadow-lg font-bold text-sm">
                    + 新增持仓
                </button>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
            <table class="w-full text-left text-sm border-collapse">
                <thead>
                    <tr class="text-slate-400 border-b border-slate-50 bg-slate-50/30 uppercase text-[10px] font-bold tracking-widest">
                        <th class="px-8 py-5">代码 / 名称</th>
                        <th class="px-4 py-5 text-center">持仓数量</th>
                        <th class="px-4 py-5 text-center">成本价</th>
                        <th class="px-4 py-5 text-center">当前现价</th>
                        <th class="px-4 py-5 text-center">今日盈亏</th>
                        <th class="px-4 py-5">收益率/收益额</th>
                        <th onclick="toggleSort()" class="sortable px-8 py-5 text-indigo-600 text-right">市值 (CNY) <span id="sortArrow">↓</span></th>
                        <th class="px-6 py-5 text-center text-slate-500">占比</th>
                        <th class="px-4 py-5 text-center text-emerald-600 bg-emerald-50/20 font-bold">拟加仓金额</th>
                        <th class="px-4 py-5"></th>
                    </tr>
                </thead>
                <tbody id="stockBody" class="divide-y divide-slate-50"></tbody>
            </table>
        </div>
    </div>

    <script>
        // --- 全局统计对象，方便同步功能读取 ---
        let currentStats = { totalToday: 0, stockToday: 0, fundToday: 0 };
        let refreshTimer = null;
        let countdownSeconds = 60;
        let currentSortDir = 'desc';

        // --- 同步功能 ---
        function syncDailyData() {
            const syncBtn = document.getElementById('syncBtn');
            const dataToSync = {
                date: new Date().toLocaleDateString(),
                timestamp: new Date().getTime(),
                totalToday: currentStats.totalToday.toFixed(2),
                stockToday: currentStats.stockToday.toFixed(2),
                fundToday: currentStats.fundToday.toFixed(2)
            };
            
            // 存入 localStorage
            localStorage.setItem('daily_profit_data', JSON.stringify(dataToSync));
            
            // 按钮反馈动画
            syncBtn.classList.add('refresh-spin', 'text-emerald-500');
            setTimeout(() => {
                syncBtn.classList.remove('refresh-spin', 'text-emerald-500');
                alert('今日盈亏数据已同步！\n日期：' + dataToSync.date + '\n盈亏：¥' + dataToSync.totalToday);
            }, 600);
        }

        // --- 排序逻辑 ---
        function toggleSort() {
            currentSortDir = currentSortDir === 'desc' ? 'asc' : 'desc';
            document.getElementById('sortArrow').innerText = currentSortDir === 'desc' ? '↓' : '↑';
            applySort();
        }

        function applySort() {
            const body = document.getElementById('stockBody');
            const rows = Array.from(body.querySelectorAll('tr'));
            rows.sort((a, b) => {
                const valA = parseFloat(a.dataset.mktValue) || 0;
                const valB = parseFloat(b.dataset.mktValue) || 0;
                return currentSortDir === 'desc' ? valB - valA : valA - valB;
            });
            rows.forEach(row => body.appendChild(row));
        }

        // --- 核心计算 ---
        function saveAndCalculate() {
            const initialCash = parseFloat(document.getElementById('cashInput').value) || 0;
            const fx = parseFloat(document.getElementById('hkdRateInput').value) || 0.88;
            const rows = document.querySelectorAll('#stockBody tr');
            let stats = { totalMkt:0, sMkt:0, fMkt:0, tP:0, stP:0, ftP:0, aP:0, saP:0, faP:0, add:0 };
            let data = [];
            
            rows.forEach(row => {
                const code = row.querySelector('.stock-code').value;
                const s = parseFloat(row.querySelector('.stock-shares').value) || 0;
                const p = parseFloat(row.querySelector('.stock-price').value) || 0;
                const rate = (code.length === 5) ? fx : 1;
                stats.totalMkt += (s * p * rate);
            });

            rows.forEach(row => {
                const code = row.querySelector('.stock-code').value;
                const s = parseFloat(row.querySelector('.stock-shares').value) || 0;
                const c = parseFloat(row.querySelector('.stock-cost').value) || 0;
                const p = parseFloat(row.querySelector('.stock-price').value) || 0;
                const cp = parseFloat(row.dataset.changePercent) || 0;
                const addPlan = parseFloat(row.querySelector('.add-cash-plan').value) || 0;
                const isFund = row.dataset.isFund === 'true';
                const rate = (code.length === 5) ? fx : 1;
                const mkt = s * p * rate;
                const pVal = (p - c) * s * rate;
                const tVal = mkt * (cp / 100);

                if (isFund) { stats.fMkt += mkt; stats.ftP += tVal; stats.faP += pVal; } 
                else { stats.sMkt += mkt; stats.stP += tVal; stats.saP += pVal; }
                stats.tP += tVal; stats.aP += pVal; stats.add += addPlan;

                row.dataset.mktValue = mkt;
                row.querySelector('.market-value').innerText = `¥${Math.round(mkt).toLocaleString()}`;
                const weight = stats.totalMkt > 0 ? (mkt / stats.totalMkt * 100).toFixed(1) : 0;
                row.querySelector('.weight-label').innerText = weight + '%';
                row.querySelector('.weight-bar').style.width = weight + '%';
                const ratio = c > 0 ? ((p - c) / c * 100).toFixed(2) : 0;
                row.querySelector('.profit-percent').innerText = (ratio > 0 ? '+' : '') + ratio + '%';
                row.querySelector('.profit-percent').className = `profit-percent font-bold text-[13px] ${ratio >= 0 ? 'up' : 'down'}`;
                row.querySelector('.profit-value').innerText = `¥${pVal.toLocaleString(undefined,{minimumFractionDigits:2})}`;
                const tEl = row.querySelector('.today-profit');
                tEl.innerText = (cp > 0 ? '+' : '') + `¥${tVal.toLocaleString(undefined,{minimumFractionDigits:2})}`;
                tEl.className = `today-profit text-center font-bold text-[13px] ${cp >= 0 ? 'up' : 'down'}`;
                data.push({ name: row.querySelector('.stock-name').value, shares: s, cost: c, price: p, code, cp, addPlan, isFund });
            });

            // 更新全局统计量供同步使用
            currentStats.totalToday = stats.tP;
            currentStats.stockToday = stats.stP;
            currentStats.fundToday = stats.ftP;

            document.getElementById('totalAssets').innerText = `¥ ${(stats.totalMkt + initialCash).toLocaleString(undefined,{minimumFractionDigits:2})}`;
            document.getElementById('stockMktTotal').innerText = `¥${Math.round(stats.sMkt).toLocaleString()}`;
            document.getElementById('fundMktTotal').innerText = `¥${Math.round(stats.fMkt).toLocaleString()}`;
            const upSub = (id, val) => {
                const el = document.getElementById(id);
                el.innerText = `¥${Math.round(val).toLocaleString()}`;
                el.className = `text-[13px] font-black mono truncate ${val >= 0 ? 'text-rose-500' : 'text-emerald-500'}`;
            };
            upSub('stockTodayP', stats.stP); upSub('fundTodayP', stats.ftP);
            upSub('stockTotalP', stats.saP); upSub('fundTotalP', stats.faP);
            document.getElementById('todayTotalProfit').innerText = (stats.tP >= 0 ? '+' : '') + `¥${stats.tP.toLocaleString(undefined,{minimumFractionDigits:2})}`;
            document.getElementById('todayTotalProfit').className = `text-xl font-bold mono ${stats.tP >= 0 ? 'up' : 'down'}`;
            document.getElementById('totalProfit').innerText = (stats.aP >= 0 ? '+' : '') + `¥${stats.aP.toLocaleString(undefined,{minimumFractionDigits:2})}`;
            document.getElementById('totalProfit').className = `text-xl font-bold mono ${stats.aP >= 0 ? 'up' : 'down'}`;
            document.getElementById('remainingCash').innerText = `¥ ${(initialCash - stats.add).toLocaleString(undefined,{minimumFractionDigits:2})}`;
            localStorage.setItem('myPortfolio_vFinal', JSON.stringify(data));
            localStorage.setItem('myCash_vFinal', initialCash);
            localStorage.setItem('myHkdRate_vFinal', fx);
        }

        // --- 刷新逻辑 ---
        function resetAutoRefresh() {
            if (refreshTimer) clearInterval(refreshTimer);
            const interval = parseInt(document.getElementById('refreshInterval').value);
            const label = document.getElementById('countdownLabel');
            const statusEl = document.getElementById('autoStatus');
            if (interval === 0) { label.innerText = "手动模式"; statusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-slate-300"></span> 待命`; return; }
            countdownSeconds = interval * 60;
            refreshTimer = setInterval(() => {
                const now = new Date();
                const timeStr = now.getHours() * 100 + now.getMinutes();
                const isTradingTime = (timeStr >= 930 && timeStr <= 1135) || (timeStr >= 1300 && timeStr <= 1605);
                if (isTradingTime) {
                    countdownSeconds--;
                    label.innerText = `${countdownSeconds}s 后刷新`;
                    statusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500 dot-blink"></span> 自动刷新中`;
                    if (countdownSeconds <= 0) { refreshAllPrices(); countdownSeconds = interval * 60; }
                } else {
                    label.innerText = "休眠中";
                    statusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-slate-300"></span> 非交易时段`;
                }
            }, 1000);
        }

        function refreshAllPrices() {
            const icon = document.getElementById('refreshIcon');
            icon.classList.add('refresh-spin');
            document.querySelectorAll('#stockBody tr').forEach(row => {
                const code = row.querySelector('.stock-code').value;
                if (code) fetchStockData(code, row);
            });
            setTimeout(() => { icon.classList.remove('refresh-spin'); applySort(); }, 800);
        }

        function fetchStockData(code, row) {
            code = code.trim(); if (code.length < 5) return;
            let prefix = '', isFund = false;
            if (code.length === 5) { prefix = 'hk'; } 
            else {
                isFund = ['00','01','11','16','20','27','32','45','50'].some(p => code.startsWith(p)) && !code.startsWith('51') && !code.startsWith('15');
                prefix = isFund ? 'jj' : (code.startsWith('5')||code.startsWith('6')||code.startsWith('9')?'sh':'sz');
            }
            const symbol = prefix + code;
            const script = document.createElement('script'); script.setAttribute('charset', 'gbk'); 
            script.src = `https://qt.gtimg.cn/q=s_${symbol}`; 
            script.onload = function() {
                const varName = "v_s_" + symbol;
                if (window[varName]) {
                    const d = window[varName].split('~');
                    if (d.length > 5) {
                        row.querySelector('.stock-name').value = d[1].replace('[基金] ', '');
                        row.dataset.isFund = isFund;
                        row.querySelector('.star-icon').innerText = isFund ? '★ ' : '';
                        row.querySelector('.stock-price').value = parseFloat(d[3]) || 0;
                        row.dataset.changePercent = d[5];
                        saveAndCalculate();
                    }
                }
                this.remove();
            };
            document.body.appendChild(script);
        }

        function addRow(n='', s=0, c=0, p=0, code='', cp=0, addPlan=0, isFund=false) {
            const tr = document.createElement('tr');
            tr.className = 'hover:bg-slate-50/80 transition group';
            tr.dataset.changePercent = cp; tr.dataset.isFund = isFund;
            tr.innerHTML = `
                <td class="px-8 py-5">
                    <div class="flex flex-col">
                        <input type="text" value="${code}" class="stock-code w-24 text-[11px] text-indigo-500 font-black bg-transparent outline-none" oninput="if(this.value.length>=5) fetchStockData(this.value, this.parentElement.parentElement.parentElement)">
                        <div class="flex items-center mt-0.5"><i class="fund-star star-icon font-bold">${isFund ? '★ ' : ''}</i><input type="text" value="${n}" class="stock-name w-40 bg-transparent font-bold text-slate-700 outline-none"></div>
                    </div>
                </td>
                <td class="px-4 py-5 text-center"><input type="number" value="${s}" class="stock-shares w-24 text-center bg-transparent font-bold mono border-b border-dashed border-slate-200" oninput="saveAndCalculate()"></td>
                <td class="px-4 py-5 text-center"><input type="number" value="${c}" class="stock-cost w-24 text-center bg-transparent mono border-b border-dashed border-slate-200 text-slate-600" oninput="saveAndCalculate()"></td>
                <td class="px-4 py-5 text-center"><input type="number" value="${p}" class="stock-price w-24 text-center bg-transparent font-bold mono text-slate-700" oninput="saveAndCalculate()"></td>
                <td class="px-4 py-5 today-profit text-center font-bold mono">¥0.00</td>
                <td class="px-4 py-5"><div class="profit-percent font-bold mono">0%</div><div class="profit-value text-[10px] text-slate-500 italic font-bold">¥0.00</div></td>
                <td class="px-8 py-5 text-right"><div class="market-value font-bold text-indigo-600 mono text-lg">¥0</div></td>
                <td class="px-6 py-5 text-center">
                    <div class="text-[11px] font-bold text-slate-400 mono weight-label">0%</div>
                    <div class="w-12 h-1 bg-slate-100 rounded-full mx-auto mt-1 overflow-hidden">
                        <div class="weight-bar h-full bg-indigo-300 rounded-full" style="width: 0%"></div>
                    </div>
                </td>
                <td class="px-4 py-5 bg-emerald-50/10 text-center"><input type="number" value="${addPlan}" class="add-cash-plan w-32 mx-auto text-center font-bold text-emerald-700 bg-transparent border-b border-emerald-200" oninput="saveAndCalculate()"></td>
                <td class="px-4 py-5 text-right"><button onclick="this.closest('tr').remove();saveAndCalculate()" class="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-rose-500 transition px-2">✕</button></td>
            `;
            document.getElementById('stockBody').appendChild(tr);
        }

        // --- 备份功能 ---
        function exportCSV() {
            const data = JSON.parse(localStorage.getItem('myPortfolio_vFinal')) || [];
            let csv = "\uFEFF代码,名称,股数,成本,计划加仓\n";
            data.forEach(i => csv += `${i.code},${i.name},${i.shares},${i.cost},${i.addPlan}\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
            link.download = `投资备份_${new Date().toLocaleDateString()}.csv`; link.click();
        }

        function importCSV(input) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const lines = e.target.result.split("\n");
                document.getElementById('stockBody').innerHTML = '';
                lines.forEach((line, index) => {
                    if (index === 0 || !line.trim()) return;
                    const cols = line.split(",");
                    if (cols.length >= 4) addRow(cols[1], parseFloat(cols[2])||0, parseFloat(cols[3])||0, 0, cols[0].trim(), 0, parseFloat(cols[4])||0);
                });
                refreshAllPrices();
            };
            reader.readAsText(input.files[0]);
        }

        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('myPortfolio_vFinal')) || [];
            document.getElementById('cashInput').value = localStorage.getItem('myCash_vFinal') || 50000;
            document.getElementById('hkdRateInput').value = localStorage.getItem('myHkdRate_vFinal') || 0.88;
            if (saved.length > 0) saved.forEach(s => addRow(s.name, s.shares, s.cost, s.price, s.code, s.cp, s.addPlan, s.isFund));
            saveAndCalculate();
            resetAutoRefresh();
        };
    </script>
</body>
</html>
