<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>投资助手</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="投资助手">

    <style>
        :root {
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
            --group-bg: #E5E5EA;
            --primary-blue: #007AFF;
            --text-main: #000000;
            --text-secondary: #8E8E93;
            --text-tertiary: #C7C7CC;
            --ios-sep: #C6C6C8;
            --title-weight: 800;
            --card-radius: 16px;
            --icon-radius: 12px;
        }

        :root[data-theme='dark'] {
            --bg-color: #000000;
            --card-bg: #1C1C1E;
            --group-bg: #2C2C2E;
            --primary-blue: #0A84FF;
            --text-main: #FFFFFF;
            --text-secondary: #8E8E93;
            --text-tertiary: #48484A;
            --ios-sep: #38383A;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            -webkit-user-select: none;
            /* 关键：消除点击延迟 */
            touch-action: manipulation;
        }

        html, body {
            overscroll-behavior-y: none;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            /* 页面入场动画 */
            animation: pageIn 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
        }

        @keyframes pageIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 离开时的渐隐动画（配合脚本触发） */
        .page-exit {
            opacity: 0;
            transform: scale(0.98);
            transition: 0.2s ease-out;
        }

        body {
            font-family: -apple-system, "SF Pro Display", "SF Pro Text", "PingFang SC", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding-bottom: 40px;
        }

        /* 头部样式 */
        .header-wrapper {
            padding: 30px 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .header-text h1 {
            font-size: 34px;
            font-weight: var(--title-weight);
            margin: 0;
            letter-spacing: -1px;
            color: var(--text-main);
        }

        .header-text p {
            color: var(--text-secondary);
            font-size: 11px;
            margin: 4px 0 0;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 600;
        }

        .theme-btn {
            background: var(--group-bg);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .theme-btn:active { transform: scale(0.85); }

        /* 分组样式 */
        .section-header {
            padding: 20px 20px 8px 32px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
        }

        .menu-group {
            margin: 0 16px 20px;
            background: var(--card-bg);
            border-radius: var(--card-radius);
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        .menu-card {
            padding: 14px 16px;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 14px;
            /* 丝滑过渡关键 */
            transition: background-color 0.2s, transform 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .menu-card:not(:last-child)::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 78px;
            right: 0;
            height: 0.5px;
            background: var(--ios-sep);
        }

        /* 仿原生触压效果 */
        .menu-card:active { 
            background-color: var(--group-bg);
            transform: scale(0.97); /* 按压缩小 */
        }

        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--icon-radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .card-content { flex: 1; }
        .card-title {
            display: block;
            font-size: 17px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 2px;
        }
        .card-sub {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.3;
        }

        .arrow {
            color: var(--text-tertiary);
            font-size: 20px;
            font-weight: 300;
        }

        .bottom-spacer { height: 40px; }
    </style>
</head>
<body>

    <div id="app" class="container">
        <div class="header-wrapper">
            <div class="header-text">
                <h1>投资助手</h1>
                <p>Portfolio Planner</p>
            </div>
            <div id="modeBtn" class="theme-btn" onclick="toggleTheme()">🌗</div>
        </div>

        <div class="section-header">资产与记录</div>
        <div class="menu-group">
            <a href="assets.html" class="menu-card">
                <div class="card-icon" style="background: linear-gradient(135deg, #007AFF, #5856D6);">💰</div>
                <div class="card-content">
                    <span class="card-title">总资产概览</span>
                    <span class="card-sub">管理持仓本金，查看实时盈亏明细</span>
                </div>
                <span class="arrow">›</span>
            </a>

            <a href="records.html" class="menu-card">
                <div class="card-icon" style="background: linear-gradient(135deg, #AF52DE, #FF375F);">📝</div>
                <div class="card-content">
                    <span class="card-title">理财记录</span>
                    <span class="card-sub">追踪每一笔买入卖出，复盘投资决策</span>
                </div>
                <span class="arrow">›</span>
            </a>

            <a href="ledger.html" class="menu-card">
                <div class="card-icon" style="background: linear-gradient(135deg, #5AC8FA, #007AFF);">📅</div>
                <div class="card-content">
                    <span class="card-title">日常随手记</span>
                    <span class="card-sub">记录日常收支，自动归类资金流向</span>
                </div>
                <span class="arrow">›</span>
            </a>
        </div>

        <div class="section-header">分析与计划</div>
        <div class="menu-group">
            <a href="calculate.html" class="menu-card">
                <div class="card-icon" style="background: linear-gradient(135deg, #64D2FF, #5AC8FA);">📈</div>
                <div class="card-content">
                    <span class="card-title">加仓计算</span>
                    <span class="card-sub">输入目标成本，精确计算所需补仓金额</span>
                </div>
                <span class="arrow">›</span>
            </a>
            <a href="plan.html" class="menu-card">
                <div class="card-icon" style="background: linear-gradient(135deg, #FF9F0A, #FFD60A);">📊</div>
                <div class="card-content">
                    <span class="card-title">基金加仓计划</span>
                    <span class="card-sub">模拟成本价下跌路径，生成分批方案</span>
                </div>
                <span class="arrow">›</span>
            </a>

            <a href="profit.html" class="menu-card">
                <div class="card-icon" style="background: linear-gradient(135deg, #30D158, #66D42A);">💵</div>
                <div class="card-content">
                    <span class="card-title">盈利预演</span>
                    <span class="card-sub">计算分批止盈路径，实现收益最大化</span>
                </div>
                <span class="arrow">›</span>
            </a>
        </div>

        <div class="bottom-spacer"></div>
    </div>

    <script>
        const html = document.documentElement;
        const modeBtn = document.getElementById('modeBtn');

        function updateUI(theme) {
            html.setAttribute('data-theme', theme);
            modeBtn.innerText = theme === 'dark' ? '☀️' : '🌗';
        }

        function toggleTheme() {
            const newTheme = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            updateUI(newTheme);
            localStorage.setItem('theme', newTheme);
        }

        // --- 核心优化：处理丝滑跳转 ---
        document.addEventListener('click', function(e) {
            let target = e.target;
            while (target && target.tagName !== 'A') {
                target = target.parentNode;
            }
            
            if (target && target.getAttribute('href') && target.hostname === window.location.hostname) {
                // 排除带有 target="_blank" 的链接
                if (target.target === '_blank') return;

                e.preventDefault();
                const href = target.getAttribute('href');
                
                // 执行一个简单的退出动画效果
                document.getElementById('app').classList.add('page-exit');
                
                // 延迟一小会儿跳转，让用户看到按压反馈
                setTimeout(() => {
                    window.location.href = href;
                }, 150);
            }
        }, false);

        // 初始化
        (function() {
            const saved = localStorage.getItem('theme');
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            updateUI(saved || (systemDark ? 'dark' : 'light'));
        })();
    </script>
</body>
</html>
