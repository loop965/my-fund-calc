<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<!-- 关联刚才创建的清单 -->
	<link rel="manifest" href="manifest.json">
	
	<!-- iOS 专用配置：隐藏 Safari 地址栏和状态栏 -->
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="apple-mobile-web-app-title" content="投资助手">
	
	<!-- App 桌面图标 (建议换成你自己的 180x180 png 图片) -->
	<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com">
	
	<!-- 阻止页面弹性滚动造成露底（可选，增加原生感） -->
	<style>
	    html, body { overscroll-behavior-y: none; }
	</style>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>投资助手</title>
    <style>
        :root {
            --bg-color: #F4F5F7;
            --card-bg: #FFFFFF;
            --primary-blue: #007AFF;
            --text-main: #1C1C1E;
            --text-secondary: #8E8E93;
            --ios-sep: #E5E5E7;
            --title-weight: 900;
        }

        [data-theme='dark'] {
            --bg-color: #000000;
            --card-bg: #1C1C1E;
            --primary-blue: #0A84FF;
            --text-main: #FFFFFF;
            --text-secondary: #8E8E93;
            --ios-sep: #38383A;
        }

        body {
            font-family: -apple-system, "SF Pro Display", "SF Pro Text", "PingFang SC", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding-bottom: 50px;
        }

        /* ✨ 优化后的头部样式 ✨ */
        .header-wrapper {
            padding: 80px 24px 40px; /* 增加了顶部的呼吸空间 */
            display: flex;
            justify-content: space-between;
            align-items: baseline; /* 底部对齐，视觉更稳 */
        }

        .header-text h1 { 
            font-size: 36px; /* 略微放大 */
            font-weight: var(--title-weight); 
            margin: 0; 
            letter-spacing: -1.5px; /* 更紧凑的苹果字间距 */
            color: var(--text-main);
            line-height: 1.1;
        }

        .header-text p { 
            color: var(--text-secondary); 
            font-size: 13px; 
            margin-top: 8px; 
            text-transform: uppercase; /* 副标题大写化 */
            letter-spacing: 1px; /* 增加字母间距，显高级 */
            font-weight: 600;
        }

        .theme-btn {
            font-size: 22px;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            padding: 8px;
            margin-right: -8px; /* 抵消内边距，确保视觉右对齐 */
        }
        .theme-btn:active { transform: scale(0.8) rotate(15deg); }

        /* 卡片列表布局 */
        .menu-list {
            padding: 0 16px; 
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .menu-card {
            background: var(--card-bg);
            border-radius: 22px; /* 圆角略微增大，更柔和 */
            padding: 20px;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            transition: all 0.25s ease;
        }

        .menu-card:active {
            transform: scale(0.96);
            background-color: var(--ios-sep);
        }

        .card-icon {
            width: 50px;
            height: 50px;
            border-radius: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
            box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.1); /* 增加图标微边框 */
        }

        .card-content { flex: 1; }
        .card-title { font-size: 18px; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
        .card-sub { font-size: 13px; color: var(--text-secondary); line-height: 1.4; font-weight: 400; }

        .arrow { color: #C4C4C6; font-size: 14px; margin-left: 4px; opacity: 0.7; }

    </style>
</head>
<body data-theme="light">

    <div class="container">
        <div class="header-wrapper">
            <div class="header-text">
                <h1>投资助手</h1>
                <p>Smart Portfolio Planner</p>
            </div>
            <div id="modeBtn" class="theme-btn" onclick="toggleTheme()">🌗</div>
        </div>

        <div class="menu-list">
            <a href="assets.html" class="menu-card">
                <div class="card-icon" style="background: linear-gradient(145deg, #007AFF, #5856D6);">💰</div>
                <div class="card-content">
                    <span class="card-title">总资产概览</span>
                    <span class="card-sub">管理持仓本金，查看实时盈亏明细</span>
                </div>
                <span class="arrow">〉</span>
            </a>

            <a href="plan.html" class="menu-card">
                <div class="card-icon" style="background: linear-gradient(145deg, #FF9500, #FFCC00);">📊</div>
                <div class="card-content">
                    <span class="card-title">基金加仓计划</span>
                    <span class="card-sub">模拟成本价下跌路径，生成分批方案</span>
                </div>
                <span class="arrow">〉</span>
            </a>

            <a href="profit.html" class="menu-card">
                <div class="card-icon" style="background: linear-gradient(145deg, #34C759, #4CD964);">💵</div>
                <div class="card-content">
                    <span class="card-title">盈利预演</span>
                    <span class="card-sub">计算分批止盈路径，实现收益最大化</span>
                </div>
                <span class="arrow">〉</span>
            </a>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            const nextTheme = currentTheme === 'light' ? 'dark' : 'light';
            body.setAttribute('data-theme', nextTheme);
            document.getElementById('modeBtn').innerText = nextTheme === 'light' ? '🌗' : '☀️';
        }

        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.body.setAttribute('data-theme', 'dark');
            document.getElementById('modeBtn').innerText = '☀️';
        }
    </script>
</body>
</html>
