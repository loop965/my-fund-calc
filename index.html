<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>投资助手</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="投资助手">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com">

    <style>
        :root {
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
            --group-bg: #E5E5EA;
            --primary-blue: #007AFF;
            --text-main: #000000;
            --text-secondary: #8E8E93;
            --text-tertiary: #C7C7CC;
            --ios-sep: #C6C6C8;
            --title-weight: 800;
            --card-radius: 16px;
            --icon-radius: 12px;
        }

        :root[data-theme='dark'] {
            --bg-color: #000000;
            --card-bg: #1C1C1E;
            --group-bg: #2C2C2E;
            --primary-blue: #0A84FF;
            --text-main: #FFFFFF;
            --text-secondary: #8E8E93;
            --text-tertiary: #48484A;
            --ios-sep: #38383A;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            /* 消除点击延迟 */
            touch-action: manipulation;
        }

        html, body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            /* 关键：forwards 确保动画结束后不消失 */
            animation: pageIn 0.4s cubic-bezier(0.1, 0.7, 0.1, 1) forwards;
        }

        @keyframes pageIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: -apple-system, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding-bottom: 40px;
        }

        /* 头部 */
        .header-wrapper {
            padding: 30px 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .header-text h1 {
            font-size: 34px;
            font-weight: var(--title-weight);
            margin: 0;
            letter-spacing: -1px;
            color: var(--text-main);
        }

        .header-text p {
            color: var(--text-secondary);
            font-size: 11px;
            margin: 4px 0 0;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 600;
        }

        /* 菜单组 */
        .section-header {
            padding: 20px 20px 8px 32px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
        }

        .menu-group {
            margin: 0 16px 20px;
            background: var(--card-bg);
            border-radius: var(--card-radius);
            overflow: hidden;
            box-shadow: 0 0 0 0.5px rgba(0,0,0,0.05);
        }

        .menu-card {
            padding: 14px 16px;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: background-color 0.2s, transform 0.1s;
        }

        .menu-card:active {
            background-color: var(--group-bg);
            transform: scale(0.97); /* 按压反馈 */
        }

        .menu-card:not(:last-child) {
            border-bottom: 0.5px solid var(--ios-sep);
        }

        .card-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--icon-radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .card-content { flex: 1; }
        .card-title {
            display: block;
            font-size: 17px;
            font-weight: 600;
            color: var(--text-main);
        }
        .card-sub {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .arrow { color: var(--text-tertiary); font-size: 18px; }

        .theme-btn {
            background: var(--group-bg);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div id="app" class="container">
        <div class="header-wrapper">
            <div class="header-text">
                <h1>投资助手</h1>
                <p>Portfolio Planner</p>
            </div>
            <div id="modeBtn" class="theme-btn" onclick="toggleTheme()">🌗</div>
        </div>

        <div class="section-header">资产与记录</div>
        <div class="menu-group">
            <a href="assets.html" class="menu-card">
                <div class="card-icon" style="background: linear-gradient(135deg, #007AFF, #5856D6);">💰</div>
                <div class="card-content">
                    <span class="card-title">总资产概览</span>
                    <span class="card-sub">管理持仓本金与盈亏明细</span>
                </div>
                <span class="arrow">›</span>
            </a>

            <a href="records.html" class="menu-card">
                <div class="card-icon" style="background: linear-gradient(135deg, #AF52DE, #FF375F);">📝</div>
                <div class="card-content">
                    <span class="card-title">理财记录</span>
                    <span class="card-sub">追踪每一笔投资决策</span>
                </div>
                <span class="arrow">›</span>
            </a>
        </div>

        <div class="section-header">工具</div>
        <div class="menu-group">
            <a href="calculate.html" class="menu-card">
                <div class="card-icon" style="background: linear-gradient(135deg, #64D2FF, #5AC8FA);">📈</div>
                <div class="card-content">
                    <span class="card-title">加仓计算</span>
                    <span class="card-sub">计算目标成本所需金额</span>
                </div>
                <span class="arrow">›</span>
            </a>
        </div>
    </div>

    <script>
        // 主题切换逻辑
        const html = document.documentElement;
        const modeBtn = document.getElementById('modeBtn');

        function updateUI(theme) {
            html.setAttribute('data-theme', theme);
            modeBtn.innerText = theme === 'dark' ? '☀️' : '🌗';
        }

        function toggleTheme() {
            const newTheme = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            updateUI(newTheme);
            localStorage.setItem('theme', newTheme);
        }

        // --- 核心修复：处理滑动返回白屏 ---
        window.addEventListener('pageshow', function(event) {
            // 如果是从缓存加载（即滑动返回）
            if (event.persisted) {
                const body = document.body;
                // 强制重置透明度，防止卡在 pageIn 动画的 0% 状态
                body.style.opacity = '1';
                // 简单触发一次重绘
                body.style.display = 'none';
                body.offsetHeight; 
                body.style.display = 'block';
            }
        });

        // 初始化
        (function() {
            const saved = localStorage.getItem('theme');
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            updateUI(saved || (systemDark ? 'dark' : 'light'));
        })();
    </script>
</body>
</html>
