<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<!-- 关联刚才创建的清单 -->
	<link rel="manifest" href="manifest.json">

	<!-- iOS 专用配置：隐藏 Safari 地址栏和状态栏 -->
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="apple-mobile-web-app-title" content="投资助手">

	<!-- App 桌面图标 (建议换成你自己的 180x180 png 图片) -->
	<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com">

	<!-- 阻止页面弹性滚动造成露底（可选，增加原生感） -->
	<style>
	    html, body { overscroll-behavior-y: none; }
	</style>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>投资助手</title>
    <style>
        :root {
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
            --group-bg: #E5E5EA;
            --primary-blue: #007AFF;
            --text-main: #000000;
            --text-secondary: #8E8E93;
            --text-tertiary: #C7C7CC;
            --ios-sep: #C6C6C8;
            --title-weight: 800;
            --card-radius: 20px;
            --icon-radius: 16px;
        }

        :root[data-theme='dark'] {
            --bg-color: #000000;
            --card-bg: #1C1C1E;
            --group-bg: #2C2C2E;
            --primary-blue: #0A84FF;
            --text-main: #FFFFFF;
            --text-secondary: #8E8E93;
            --text-tertiary: #48484A;
            --ios-sep: #38383A;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        html {
            background-color: #F2F2F7;
        }
        html[data-theme='dark'] {
            background-color: #000000;
        }
        body {
            font-family: -apple-system, "SF Pro Display", "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding-bottom: calc(60px + env(safe-area-inset-bottom));
        }

        /* iOS 17 头部样式 */
        .header-wrapper {
            padding: 20px 20px 8px;
            padding-top: max(20px, env(safe-area-inset-top));
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-text h1 {
            font-size: 34px;
            font-weight: var(--title-weight);
            margin: 0;
            letter-spacing: -0.8px;
            color: var(--text-main);
            line-height: 1.1;
        }

        .header-text p {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            opacity: 0.8;
        }

        .theme-btn {
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s ease;
            user-select: none;
            padding: 12px;
            margin-right: -12px;
            opacity: 0.85;
            background: var(--group-bg);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .theme-btn:active { transform: scale(0.92); opacity: 0.6; }

        /* iOS 17 分组列表样式 */
        .section-header {
            padding: 16px 20px 8px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .menu-group {
            margin: 10px 16px;
            background: var(--card-bg);
            border-radius: var(--card-radius);
            overflow: hidden;
            box-shadow: 0 0 0 0.5px rgba(0,0,0,0.05);
        }

        .menu-card {
            background: var(--card-bg);
            padding: 18px 16px;
            padding-right: 12px;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: background-color 0.2s ease;
            position: relative;
        }

        .menu-card:not(:last-child)::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 82px;
            right: 0;
            height: 0.5px;
            background: var(--ios-sep);
            opacity: 0.6;
        }

        .menu-card:active {
            background-color: var(--group-bg);
        }

        .card-icon {
            width: 54px;
            height: 54px;
            border-radius: var(--icon-radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .card-content {
            flex: 1;
            min-width: 0;
        }
        .card-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 3px;
            letter-spacing: -0.2px;
        }
        .card-sub {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.4;
            font-weight: 400;
        }

        .arrow {
            color: var(--text-tertiary);
            font-size: 18px;
            opacity: 0.7;
            font-weight: 400;
            transform: scaleX(0.8);
        }

        /* iOS 风格底部安全区域 */
        .bottom-spacer {
            height: max(20px, env(safe-area-inset-bottom));
        }
    </style>
    <script>
        // 在页面渲染前立即设置主题，防止闪烁
        (function() {
            const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        })();
    </script>
</head>
<body>

    <div class="container">
        <div class="header-wrapper">
            <div class="header-text">
                <h1>投资助手</h1>
                <p>Smart Portfolio Planner</p>
            </div>
            <div id="modeBtn" class="theme-btn" onclick="toggleTheme()">🌗</div>
        </div>

        <div class="section-header">功能</div>

        <div class="menu-group">
            <a href="assets.html" class="menu-card">
                <div class="card-icon" style="background: linear-gradient(135deg, #007AFF, #5856D6);">💰</div>
                <div class="card-content">
                    <span class="card-title">总资产概览</span>
                    <span class="card-sub">管理持仓本金，查看实时盈亏明细</span>
                </div>
                <span class="arrow">›</span>
            </a>

            <a href="records.html" class="menu-card">
                <div class="card-icon" style="background: linear-gradient(135deg, #AF52DE, #FF375F);">📝</div>
                <div class="card-content">
                    <span class="card-title">理财记录</span>
                    <span class="card-sub">追踪每一笔买入卖出，复盘投资决策</span>
                </div>
                <span class="arrow">›</span>
            </a>

            <a href="plan.html" class="menu-card">
                <div class="card-icon" style="background: linear-gradient(135deg, #FF9F0A, #FFD60A);">📊</div>
                <div class="card-content">
                    <span class="card-title">基金加仓计划</span>
                    <span class="card-sub">模拟成本价下跌路径，生成分批方案</span>
                </div>
                <span class="arrow">›</span>
            </a>

            <a href="profit.html" class="menu-card">
                <div class="card-icon" style="background: linear-gradient(135deg, #30D158, #66D42A);">💵</div>
                <div class="card-content">
                    <span class="card-title">盈利预演</span>
                    <span class="card-sub">计算分批止盈路径，实现收益最大化</span>
                </div>
                <span class="arrow">›</span>
            </a>
        </div>

        <div class="bottom-spacer"></div>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const nextTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', nextTheme);
            document.getElementById('modeBtn').innerText = nextTheme === 'light' ? '🌗' : '☀️';
        }

        // 初始化按钮状态
        (function() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.getElementById('modeBtn').innerText = isDark ? '☀️' : '🌗';
        })();

        // 监听系统主题变化
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
            const newTheme = e.matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            document.getElementById('modeBtn').innerText = newTheme === 'light' ? '🌗' : '☀️';
        });
    </script>
</body>
</html>
