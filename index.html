<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<!-- 关联刚才创建的清单 -->
	<link rel="manifest" href="manifest.json">
	
	<!-- iOS 专用配置：隐藏 Safari 地址栏和状态栏 -->
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="apple-mobile-web-app-title" content="投资助手">
	
	<!-- App 桌面图标 (建议换成你自己的 180x180 png 图片) -->
	<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com">
	
	<!-- 阻止页面弹性滚动造成露底（可选，增加原生感） -->
	<style>
	    html, body { overscroll-behavior-y: none; }
	</style>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>投资助手</title>
    <style>
        :root {
            --bg-color: #F4F5F7;
            --card-bg: #FFFFFF;
            --primary-blue: #007AFF;
            --text-main: #1C1C1E;
            --text-secondary: #8E8E93;
            --ios-sep: #E5E5E7;
            --title-weight: 900;
        }

        [data-theme='dark'] {
            --bg-color: #000000;
            --card-bg: #1C1C1E;
            --primary-blue: #0A84FF;
            --text-main: #FFFFFF;
            --text-secondary: #8E8E93;
            --ios-sep: #38383A;
        }

        body {
            font-family: -apple-system, "SF Pro Display", "SF Pro Text", "PingFang SC", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 440px;
            padding-bottom: 60px;
        }

        /* ✨ 优化后的头部样式 ✨ */
        .header-wrapper {
            padding: 50px 24px 30px; /* 减少顶部内边距，使布局更靠近顶部 */
            display: flex;
            justify-content: space-between;
            align-items: baseline; /* 底部对齐，视觉更稳 */
        }

        .header-text h1 {
            font-size: 38px; /* 略微放大 */
            font-weight: var(--title-weight);
            margin: 0;
            letter-spacing: -1.8px; /* 更紧凑的苹果字间距 */
            color: var(--text-main);
            line-height: 1.05;
        }

        .header-text p {
            color: var(--text-secondary);
            font-size: 13.5px;
            margin-top: 10px;
            text-transform: uppercase; /* 副标题大写化 */
            letter-spacing: 1.2px; /* 增加字母间距，显高级 */
            font-weight: 650;
            opacity: 0.9;
        }

        .theme-btn {
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s ease;
            user-select: none;
            padding: 10px;
            margin-right: -10px; /* 抵消内边距，确保视觉右对齐 */
            opacity: 0.9;
        }
        .theme-btn:active { transform: scale(0.85) rotate(12deg); opacity: 0.7; }

        /* 卡片列表布局 */
        .menu-list {
            padding: 0 18px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .menu-card {
            background: var(--card-bg);
            border-radius: 24px; /* 增大圆角，更现代柔和 */
            padding: 22px 20px;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 18px;
            box-shadow: 0 6px 30px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 0.5px solid rgba(0,0,0,0.03);
        }

        .menu-card:active {
            transform: scale(0.98);
            background-color: var(--ios-sep);
            box-shadow: 0 3px 15px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.04);
        }

        .card-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.2), 0 2px 6px rgba(0,0,0,0.08);
            border: 0.5px solid rgba(0,0,0,0.05);
        }

        .card-content { flex: 1; }
        .card-title { font-size: 19px; font-weight: 750; color: var(--text-main); margin-bottom: 6px; letter-spacing: -0.2px; }
        .card-sub { font-size: 13.5px; color: var(--text-secondary); line-height: 1.5; font-weight: 400; opacity: 0.9; }

        .arrow { color: #C4C4C6; font-size: 14px; margin-left: 4px; opacity: 0.7; }

    </style>
</head>
<body data-theme="light">

    <div class="container">
        <div class="header-wrapper">
            <div class="header-text">
                <h1>投资助手</h1>
                <p>Smart Portfolio Planner</p>
            </div>
            <div id="modeBtn" class="theme-btn" onclick="toggleTheme()">🌗</div>
        </div>

        <div class="menu-list">
            <a  href="assets.html" class="menu-card">
                <div class="card-icon" style="background: linear-gradient(145deg, #007AFF, #5856D6);">💰</div>
                <div class="card-content">
                    <span class="card-title">总资产概览</span>
                    <span class="card-sub">管理持仓本金，查看实时盈亏明细</span>
                </div>
                <span class="arrow">〉</span>
            </a>
			
			<!-- 新增：理财记录卡片 -->
			<a href="records.html"   class="menu-card">
			    <div class="card-icon" style="background: linear-gradient(145deg, #AF52DE, #5856D6);">📝</div>
			    <div class="card-content">
			        <span class="card-title">理财记录</span>
			        <span class="card-sub">追踪每一笔买入卖出，复盘投资决策</span>
			    </div>
			    <span class="arrow">〉</span>
			</a>

            <a href="plan.html" class="menu-card">
                <div class="card-icon" style="background: linear-gradient(145deg, #FF9500, #FFCC00);">📊</div>
                <div class="card-content">
                    <span class="card-title">基金加仓计划</span>
                    <span class="card-sub">模拟成本价下跌路径，生成分批方案</span>
                </div>
                <span class="arrow">〉</span>
            </a>

            <a href="profit.html" class="menu-card">
                <div class="card-icon" style="background: linear-gradient(145deg, #34C759, #4CD964);">💵</div>
                <div class="card-content">
                    <span class="card-title">盈利预演</span>
                    <span class="card-sub">计算分批止盈路径，实现收益最大化</span>
                </div>
                <span class="arrow">〉</span>
            </a>
			

        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            const nextTheme = currentTheme === 'light' ? 'dark' : 'light';
            body.setAttribute('data-theme', nextTheme);
            document.getElementById('modeBtn').innerText = nextTheme === 'light' ? '🌗' : '☀️';
        }

        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.body.setAttribute('data-theme', 'dark');
            document.getElementById('modeBtn').innerText = '☀️';
        }
		
		async function go(url){
		
		const html = await fetch(url).then(r=>r.text())
		
		document.body.innerHTML = html
		
		}
    </script>
</body>
</html>
