<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
	<!-- 关联刚才创建的清单 -->
	<link rel="manifest" href="manifest.json">

	<!-- iOS 专用配置：隐藏 Safari 地址栏和状态栏 -->
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="apple-mobile-web-app-title" content="理财记录">

	<!-- App 桌面图标 (建议换成你自己的 180x180 png 图片) -->
	<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>理财记录 Pro</title>
    <style>
        :root {
            --bg-page: #F2F2F7;
            --card-white: #FFFFFF;
            --group-bg: #E5E5EA;
            --profit-text: #FF3B30;
            --loss-text: #34C759;
            --profit-bg: #FFE5E5;
            --loss-bg: #E5F5E5;
            --dark-profit: #FF6B6B;
            --dark-loss: #6BCB77;
            --ios-blue: #007AFF;
            --text-main: #000000;
            --text-sub: #8E8E93;
            --text-tertiary: #C7C7CC;
            --ios-sep: #C6C6C8;
            --btn-gray: #F5F5F7;
        }

        :root[data-theme='dark'] {
            --bg-page: #000000;
            --card-white: #1C1C1E;
            --group-bg: #2C2C2E;
            --text-main: #FFFFFF;
            --text-sub: #8E8E93;
            --text-tertiary: #48484A;
            --ios-sep: #38383A;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            background-color: #F2F2F7;
        }
        html[data-theme='dark'] {
            background-color: #000000;
        }
        body {
            font-family: -apple-system, "SF Pro Display", "SF Pro Text", "PingFang SC", Helvetica Neue, sans-serif;
            background-color: var(--bg-page);
            margin: 0;
            padding: 0;
            padding-top: max(8px, env(safe-area-inset-top));
            padding-bottom: env(safe-area-inset-bottom);
            color: var(--text-main);
            letter-spacing: -0.3px;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 16px;
        }

        /* 导航头部 */
        .nav-header {
            display: flex;
            align-items: center;
            padding: 8px 4px 16px;
        }

        .back-btn {
            background: var(--group-bg);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--ios-blue);
            margin-right: 12px;
        }

        .page-title {
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -0.8px;
            margin: 0;
        }

        /* 分组卡片样式 - iOS 17 */
        .section-header {
            padding: 16px 4px 8px;
            color: var(--text-sub);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .card-group {
            background: var(--card-white);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 8px;
            box-shadow: 0 0 0 0.5px rgba(0,0,0,0.05);
        }

        .card-group-inner {
            padding: 18px;
        }

        .field-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            position: relative;
        }

        .field-group:not(:last-child)::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 0.5px;
            background: var(--ios-sep);
            opacity: 0.6;
        }

        .label-icon {
            display: flex;
            align-items: center;
            font-size: 17px;
            font-weight: 400;
        }

        .brand-tag {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            margin-right: 12px;
            font-weight: 600;
        }

        .tag-ali { background: linear-gradient(135deg, #1677FF, #0056CC); }
        .tag-ths { background: linear-gradient(135deg, #EE1B2D, #CC0F1F); }

        input[type="date"] {
            border: none;
            background: transparent;
            font-weight: 600;
            outline: none;
            text-align: right;
            font-size: 17px;
            color: var(--text-sub);
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="number"] {
            border: none;
            background: var(--group-bg);
            font-weight: 600;
            outline: none;
            text-align: right;
            font-size: 17px;
            width: 120px;
            font-variant-numeric: tabular-nums;
            padding: 8px 12px;
            border-radius: 10px;
        }

        .sign-btn {
            background: var(--group-bg);
            border: none;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            color: var(--ios-blue);
        }

        .sign-btn:active { opacity: 0.7; }

        .save-btn {
            width: 100%;
            background: var(--ios-blue);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            margin-top: 16px;
            cursor: pointer;
            letter-spacing: -0.2px;
        }

        .save-btn:active { opacity: 0.8; }

        /* 统计面板 - iOS 17 风格 */
        .stat-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 8px;
        }

        .stat-item {
            background: var(--card-white);
            padding: 14px 16px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 64px;
            box-shadow: 0 0 0 0.5px rgba(0,0,0,0.05);
        }

        .stat-item.dark {
            background: linear-gradient(135deg, #1C1C1E, #2C2C2E);
            color: white;
            cursor: pointer;
        }

        [data-theme='dark'] .stat-item.dark {
            background: linear-gradient(135deg, #2C2C2E, #3A3A3C);
        }

        .stat-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-sub);
            margin-bottom: 4px;
        }

        .stat-item.dark .stat-label {
            color: #98989D;
        }

        .stat-val {
            font-size: 19px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.5px;
        }

        /* 工具按钮 */
        .tool-btns {
            display: flex;
            gap: 12px;
            margin-bottom: 8px;
        }

        .btn-flex {
            flex: 1;
            background: var(--card-white);
            padding: 14px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--ios-blue);
            border: none;
            box-shadow: 0 0 0 0.5px rgba(0,0,0,0.05);
        }

        .btn-flex:active { opacity: 0.7; }

        /* 日历头部 */
        .cal-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 11px 0 12px;
        }

        .cal-nav {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cal-btn {
            background: var(--group-bg);
            border: none;
            width: auto;
            height: 34px;
            padding: 0 14px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--ios-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 500;
        }

        .cal-btn:active { opacity: 0.7; }

        .v-title {
            font-weight: 700;
            font-size: 17px;
            letter-spacing: -0.2px;
        }

        /* iOS 17 分段控制器 */
        .view-switcher {
            background: var(--group-bg);
            padding: 3px;
            border-radius: 8px;
            display: flex;
            height: 34px;
        }

        .sw-btn {
            border: none;
            background: transparent;
            padding: 0 14px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-sub);
            height: 100%;
        }

        .sw-btn.active {
            background: var(--card-white);
            color: var(--text-main);
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
        }

        /* 账户切换器 - iOS 17 风格 */
        .account-switcher {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        .ac-btn {
            border: none;
            background: var(--group-bg);
            padding: 12px 8px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            color: var(--text-sub);
            transition: all 0.2s ease;
        }

        .ac-btn.active {
            background: var(--ios-blue);
            color: white;
        }

        .ac-btn:active {
            opacity: 0.8;
        }

        /* 日历网格 - iOS 17 风格 */
        .grid {
            display: grid;
            gap: 6px;
        }

        .grid-day {
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }

        .grid-month {
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .week {
            font-size: 13px;
            color: var(--text-sub);
            text-align: center;
            font-weight: 600;
            padding-bottom: 8px;
        }

        .cell {
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.15s ease, background-color 0.2s ease;
            position: relative;
        }

        .cell:active {
            transform: scale(0.96);
        }

        .cell-day {
            aspect-ratio: 1/1;
            background: #F9F9F9;
        }

        .cell-month {
            height: 72px;
            background: #F9F9F9;
        }

        :root[data-theme='dark'] .cell-day,
        :root[data-theme='dark'] .cell-month {
            background: #1C1C1E;
        }

        .cell-selected {
            background: inherit !important;
            z-index: 2;
            box-shadow: 0 0 0 2px var(--ios-blue);
        }

        .cell-p {
            background: var(--profit-bg) !important;
        }

        .cell-p .d-num {
            color: var(--profit-text);
        }

        .cell-p .d-val {
            color: var(--profit-text);
        }

        .cell-l {
            background: var(--loss-bg) !important;
        }

        .cell-l .d-num {
            color: var(--loss-text);
        }

        .cell-l .d-val {
            color: var(--loss-text);
        }

        .d-num {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 1px;
            color: var(--text-main);
        }

        .d-val {
            font-size: 11px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .is-today .d-num {
            color: var(--ios-blue);
            font-weight: 700;
        }

        /* 弹窗 */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .pop {
            background: var(--card-white);
            width: 100%;
            max-width: 360px;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .pop-row {
            display: flex;
            justify-content: space-between;
            padding: 14px 0;
            font-size: 17px;
            position: relative;
        }

        .pop-row:not(:last-of-type)::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 0.5px;
            background: var(--ios-sep);
            opacity: 0.6;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 13px;
            color: var(--text-sub);
            padding-bottom: 40px;
        }

        #csvFile { display: none; }

        .bottom-spacer {
            height: max(20px, env(safe-area-inset-bottom));
        }
    </style>
    <script>
        // 在页面渲染前立即设置主题，防止闪烁
        (function() {
            const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        })();
    </script>
</head>
<body>
    <div class="app-container">

        <!-- 录入面板 -->
        <div class="card-group">
            <div class="card-group-inner">
                <div class="field-group">
                    <div class="label-icon">📅 记录日期</div>
                    <input type="date" id="targetDate" onchange="this.blur(); render();">
                </div>
                <div class="field-group">
                    <div class="label-icon"><span class="brand-tag tag-ali">支</span> 支付宝</div>
                    <div class="input-row">
                        <button class="sign-btn" onclick="tSign('alipay')">±</button>
                        <input type="number" id="alipay" placeholder="0.00" inputmode="decimal">
                    </div>
                </div>
                <div class="field-group">
                    <div class="label-icon"><span class="brand-tag tag-ths">同</span> 同花顺</div>
                    <div class="input-row">
                        <button class="sign-btn" onclick="tSign('ths')">±</button>
                        <input type="number" id="ths" placeholder="0.00" inputmode="decimal">
                    </div>
                </div>
                <button class="save-btn" onclick="save()">保存收益数据</button>
            </div>
        </div>

        <!-- 统计面板 -->
        <div class="stat-bar">
            <div class="stat-item">
                <span class="stat-label" id="mLabel">--月累计</span>
                <div class="stat-val" id="mTotal">¥ 0.00</div>
            </div>
            <div class="stat-item dark" onclick="togglePrivacy()">
                <span class="stat-label" id="yLabel">--年度收益</span>
                <div class="stat-val" id="yTotal">¥ 0.00</div>
            </div>
        </div>

        <!-- 主视图 -->
        <div class="card-group">
            <div class="card-group-inner">
                <div class="cal-head">
                    <div class="cal-nav">
                        <button class="cal-btn" onclick="move(-1)">‹</button>
                        <div id="vTitle" class="v-title">--</div>
                        <button class="cal-btn" onclick="move(1)">›</button>
                    </div>
                    <div class="view-switcher">
                        <button class="sw-btn active" id="sw-day" onclick="switchView('day')">日</button>
                        <button class="sw-btn" id="sw-month" onclick="switchView('month')">月</button>
                        <button class="sw-btn" id="sw-year" onclick="switchView('year')">年</button>
                    </div>
                </div>
                <div id="mainGrid" class="grid grid-day"></div>
            </div>
        </div>

        <!-- 账户切换 -->
        <div class="card-group" style="margin-bottom:8px;">
            <div class="card-group-inner">
                <div class="account-switcher">
                    <button class="ac-btn active" id="ac-all" onclick="switchAccount('all')">全部</button>
                    <button class="ac-btn" id="ac-alipay" onclick="switchAccount('alipay')">支付宝</button>
                    <button class="ac-btn" id="ac-ths" onclick="switchAccount('ths')">同花顺</button>
                </div>
            </div>
        </div>

        <!-- 功能按钮组 -->
        <div class="tool-btns">
            <input type="file" id="csvFile" onchange="impCSV(this)">
            <button class="btn-flex" onclick="document.getElementById('csvFile').click()">📥 导入数据</button>
            <button class="btn-flex" onclick="expCSV()">📤 导出数据</button>
        </div>

        <div class="footer"><span onclick="reset()" style="cursor:pointer">🔄 重置本地全部数据</span></div>
        <div class="bottom-spacer"></div>
    </div>

    <!-- 详情弹窗 -->
    <div id="popOverlay" class="overlay" onclick="closePop()">
        <div class="pop" onclick="event.stopPropagation()">
            <div id="pDate" style="text-align:center; font-weight:700; margin-bottom:20px; font-size:20px; letter-spacing:-0.5px;"></div>
            <div class="pop-row"><span>支付宝</span><span id="pAli" style="font-weight:600;"></span></div>
            <div class="pop-row"><span>同花顺</span><span id="pThs" style="font-weight:600;"></span></div>
            <div class="pop-row" style="border:none; padding-top:20px;"><span style="font-weight:600; color:var(--text-sub);">合计</span><span id="pAll" style="font-size:26px; font-weight:700; letter-spacing:-0.5px;"></span></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:24px;">
                <button class="save-btn" style="background:var(--profit-bg); color:var(--profit-text); margin:0;" id="delB">删除</button>
                <button class="save-btn" style="background:var(--group-bg); color:var(--ios-blue); margin:0;" onclick="closePop()">完成</button>
            </div>
        </div>
    </div>

    <script>
        let vDate = new Date(), viewMode = 'day', yearPrivate = false, accountMode = 'all';
        const KEY = 'fin_v_final_v24';

        window.onload = () => {
            const todayStr = new Date().toLocaleDateString('en-CA');
            document.getElementById('targetDate').value = todayStr;
            render();
        };

        function togglePrivacy() { yearPrivate = !yearPrivate; render(); }
        function closePop() { document.getElementById('popOverlay').style.display='none'; }

        function switchView(mode) {
            viewMode = mode;
            document.querySelectorAll('#sw-day, #sw-month, #sw-year').forEach(b => b.classList.remove('active'));
            document.getElementById('sw-' + mode).classList.add('active');
            render();
        }

        function switchAccount(mode) {
            accountMode = mode;
            document.querySelectorAll('.ac-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('ac-' + mode).classList.add('active');
            render();
        }

        function getValueForAccount(record) {
            if (accountMode === 'alipay') return parseFloat(record.a || 0);
            if (accountMode === 'ths') return parseFloat(record.t || 0);
            return parseFloat(record.total || 0);
        }

        function tSign(id) { const e = document.getElementById(id); if(e.value && e.value !== "0") e.value = (parseFloat(e.value)*-1).toString(); }

        function save() {
            const v1 = parseFloat(document.getElementById('alipay').value)||0, v2 = parseFloat(document.getElementById('ths').value)||0, d = document.getElementById('targetDate').value;
            if(!d) return;
            let db = JSON.parse(localStorage.getItem(KEY)||'{}');
            db[d] = { a: v1, t: v2, total: (v1+v2).toFixed(2) };
            localStorage.setItem(KEY, JSON.stringify(db));
            document.getElementById('alipay').value = ''; document.getElementById('ths').value = '';
            render();
        }

        function move(s) {
            if(viewMode === 'day') vDate.setMonth(vDate.getMonth() + s);
            else if(viewMode === 'month') vDate.setFullYear(vDate.getFullYear() + s);
            else vDate.setFullYear(vDate.getFullYear() + (s * 6));
            render();
        }

        function render() {
            const grid = document.getElementById('mainGrid'); grid.innerHTML = '';
            const db = JSON.parse(localStorage.getItem(KEY)||'{}');
            const curY = vDate.getFullYear(), curM = vDate.getMonth();
            const selectedDate = document.getElementById('targetDate').value;

            let mT = 0, yT = 0;
            Object.keys(db).forEach(k => {
                const val = getValueForAccount(db[k]);
                if(k.startsWith(curY + '-')) {
                    yT += val;
                    const monthKey = `${curY}-${String(curM+1).padStart(2,'0')}`;
                    if(k.startsWith(monthKey)) mT += val;
                }
            });

            const accountLabel = accountMode === 'all' ? '' : (accountMode === 'alipay' ? '（支付宝）' : '（同花顺）');
            document.getElementById('mLabel').innerText = (curM+1)+'月累计' + accountLabel;
            document.getElementById('yLabel').innerText = curY+'年度收益' + accountLabel;
            const f = (v) => v.toLocaleString(undefined,{minimumFractionDigits:2});
            const mValEl = document.getElementById('mTotal');
            mValEl.innerText = '¥ ' + f(mT);
            mValEl.style.color = mT >= 0 ? 'var(--profit-text)' : 'var(--loss-text)';
            const yValEl = document.getElementById('yTotal');
            if(yearPrivate) { yValEl.innerText = '¥ ****'; yValEl.style.color = '#8E8E93'; }
            else { yValEl.innerText = '¥ ' + f(yT); yValEl.style.color = yT >= 0 ? 'var(--dark-profit)' : 'var(--dark-loss)'; }

            if(viewMode === 'day') renderDay(grid, db, curY, curM, selectedDate);
            else if(viewMode === 'month') renderMonth(grid, db, curY);
            else renderYear(grid, db, curY);
        }

        function renderDay(grid, db, y, m, selectedDate) {
            grid.className = 'grid grid-day';
            ['一','二','三','四','五'].forEach(w => {
                const d = document.createElement('div'); d.className = 'week'; d.innerText = w; grid.appendChild(d);
            });
            document.getElementById('vTitle').innerText = `${y}年 ${m+1}月`;
            const firstDayOfMonth = new Date(y, m, 1).getDay();
            const totalDays = new Date(y, m + 1, 0).getDate();
            const todayStr = new Date().toLocaleDateString('en-CA');
            let offset = firstDayOfMonth === 0 ? 0 : firstDayOfMonth - 1;
            if(firstDayOfMonth === 6 || firstDayOfMonth === 0) offset = 0;
            for(let i=0; i<offset && offset < 5; i++) grid.appendChild(document.createElement('div'));
            for(let d=1; d<=totalDays; d++) {
                const dateObj = new Date(y, m, d);
                const dayOfWeek = dateObj.getDay();
                if(dayOfWeek === 0 || dayOfWeek === 6) continue;
                const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const r = db[ds], cell = document.createElement('div');
                cell.className = 'cell cell-day';
                if (ds === selectedDate) cell.classList.add('cell-selected');
                let isT = (ds === todayStr);
                if (isT) cell.classList.add('is-today');
                cell.innerHTML = `<div class="d-num">${d}</div>`;
                if(r) {
                    const v = getValueForAccount(r);
                    const hasValue = accountMode === 'all' ||
                                   (accountMode === 'alipay' && r.a !== 0) ||
                                   (accountMode === 'ths' && r.t !== 0);
                    if (hasValue) {
                        cell.classList.add(v>=0?'cell-p':'cell-l');
                        cell.innerHTML += `<div class="d-val">${v>=0?'+':''}${Math.round(v)}</div>`;
                    }
                    cell.onclick = () => {
                        if (ds === selectedDate) {
                            showPop(ds, r);
                        } else {
                            document.getElementById('targetDate').value = ds;
                            document.getElementById('alipay').value = r.a !== 0 ? r.a : '';
                            document.getElementById('ths').value = r.t !== 0 ? r.t : '';
                            render();
                        }
                    };
                } else {
                    cell.onclick = () => {
                        document.getElementById('targetDate').value = ds;
                        document.getElementById('alipay').value = '';
                        document.getElementById('ths').value = '';
                        render();
                    };
                }
                grid.appendChild(cell);
            }
        }

        function renderMonth(grid, db, y) {
            grid.className = 'grid grid-month';
            document.getElementById('vTitle').innerText = `${y}年`;
            for(let i=1; i<=12; i++) {
                let mSum = 0, has = false;
                const mPrefix = `${y}-${String(i).padStart(2,'0')}`;
                Object.keys(db).forEach(k => {
                    if(k.startsWith(mPrefix)) {
                        const v = getValueForAccount(db[k]);
                        mSum += v;
                        if (accountMode === 'all') has = true;
                        else if (accountMode === 'alipay' && db[k].a !== 0) has = true;
                        else if (accountMode === 'ths' && db[k].t !== 0) has = true;
                    }
                });
                const cell = document.createElement('div'); cell.className = 'cell cell-month';
                if(has) { cell.classList.add(mSum>=0?'cell-p':'cell-l'); cell.innerHTML = `<div class="d-num" style="font-size:15px">${i}月</div><div class="d-val">${(mSum>=0?'+':'')+Math.round(mSum)}</div>`; }
                else { cell.innerHTML = `<div class="d-num" style="font-size:15px; color:var(--text-tertiary)">${i}月</div><div class="d-val" style="color:var(--text-tertiary)">0</div>`; }
                cell.onclick = () => { vDate.setMonth(i-1); switchView('day'); };
                grid.appendChild(cell);
            }
        }

        function renderYear(grid, db, y) {
            grid.className = 'grid grid-month';
            document.getElementById('vTitle').innerText = `年度对比`;
            for(let i = y - 2; i <= y + 3; i++) {
                let ySum = 0, has = false;
                Object.keys(db).forEach(k => {
                    if(k.startsWith(i + '-')) {
                        const v = getValueForAccount(db[k]);
                        ySum += v;
                        if (accountMode === 'all') has = true;
                        else if (accountMode === 'alipay' && db[k].a !== 0) has = true;
                        else if (accountMode === 'ths' && db[k].t !== 0) has = true;
                    }
                });
                const cell = document.createElement('div'); cell.className = 'cell cell-month';
                if(has) { cell.classList.add(ySum>=0?'cell-p':'cell-l'); cell.innerHTML = `<div class="d-num" style="font-size:15px">${i}</div><div class="d-val">${(ySum>=0?'+':'')+Math.round(ySum)}</div>`; }
                else { cell.innerHTML = `<div class="d-num" style="font-size:15px; color:var(--text-tertiary)">${i}</div><div class="d-val" style="color:var(--text-tertiary)">0</div>`; }
                cell.onclick = () => { vDate.setFullYear(i); switchView('month'); };
                grid.appendChild(cell);
            }
        }

        function showPop(d, r) {
            document.getElementById('pDate').innerText = d.replace(/-/g, ' / ');
            const set = (id, v) => { const e = document.getElementById(id); e.innerText = (v>=0?'+':'')+parseFloat(v).toFixed(2); e.style.color = v>=0?'var(--profit-text)':'var(--loss-text)'; };
            set('pAli', r.a); set('pThs', r.t); set('pAll', r.total);
            document.getElementById('delB').onclick = () => { if(confirm('确定删除？')) { let db = JSON.parse(localStorage.getItem(KEY)); delete db[d]; localStorage.setItem(KEY, JSON.stringify(db)); closePop(); render(); } };
            document.getElementById('popOverlay').style.display = 'flex';
        }

        function expCSV() {
            let db = JSON.parse(localStorage.getItem(KEY)||'{}'), keys = Object.keys(db).sort();
            let csv = "\ufeff日期,支付宝,同花顺,合计\n";
            keys.forEach(k => csv += `${k},${db[k].a},${db[k].t},${db[k].total}\n`);
            const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `理财导出_${new Date().toISOString().split('T')}.csv`; a.click();
        }

        function impCSV(input) {
            const r = new FileReader();
            r.onload = (e) => {
                const rows = e.target.result.split('\n');
                let db = JSON.parse(localStorage.getItem(KEY) || '{}');

                rows.slice(1).forEach(row => {
                    const c = row.split(',');
                    // 确保行不为空且列数足够
                    if (c.length >= 4 && c[0].trim()) {
                        const id = c[0].trim();
                        db[id] = {
                            a: parseFloat(c[1]) || 0,
                            t: parseFloat(c[2]) || 0,
                            total: parseFloat(c[3]).toFixed(2)
                        };
                    }
                });

                localStorage.setItem(KEY, JSON.stringify(db));
                if (typeof render === 'function') render();
                alert('导入成功');
            };
            if (input.files[0]) r.readAsText(input.files[0]);
        }

        function reset() { if(confirm('⚠️ 确定清空？')) { localStorage.removeItem(KEY); render(); } }
    </script>
</body>
</html>
