<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
	<link rel="manifest" href="manifest.json">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="apple-mobile-web-app-title" content="理财记录">
	<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>理财记录</title>
    <style>
        :root {
            --bg-page: #F2F2F7; --card-white: #FFFFFF; --group-bg: #E5E5EA;
            --profit-text: #FF3B30; --loss-text: #34C759;
            --profit-bg: #FFE5E5; --loss-bg: #E5F5E5;
            --dark-profit: #FF6B6B; --dark-loss: #6BCB77;
            --ios-blue: #007AFF; --text-main: #000000; --text-sub: #8E8E93;
            --ios-sep: #C6C6C8;
        }

        :root[data-theme='dark'] {
            --bg-page: #000000; --card-white: #1C1C1E; --group-bg: #2C2C2E;
            --text-main: #FFFFFF; --ios-sep: #38383A;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, "SF Pro Display", sans-serif;
            background-color: var(--bg-page); margin: 0;
            padding: max(8px, env(safe-area-inset-top)) 0 env(safe-area-inset-bottom);
            color: var(--text-main);
        }

        .app-container { max-width: 500px; margin: 0 auto; padding: 0 16px; }

        /* 录入卡片 */
        .card-group { background: var(--card-white); border-radius: 20px; overflow: hidden; margin-bottom: 8px; box-shadow: 0 0 0 0.5px rgba(0,0,0,0.05); }
        .card-group-inner { padding: 18px; }
        .field-group { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; position: relative; }
        .field-group:not(:last-child)::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 0.5px; background: var(--ios-sep); opacity: 0.6; }

        .brand-tag { width: 28px; height: 28px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; color: white; font-size: 14px; margin-right: 12px; font-weight: 600; }
        .tag-ali { background: linear-gradient(135deg, #1677FF, #0056CC); }
        .tag-ths { background: linear-gradient(135deg, #EE1B2D, #CC0F1F); }

        input { border: none; background: var(--group-bg); font-weight: 600; outline: none; text-align: right; font-size: 17px; padding: 8px 12px; border-radius: 10px; color: var(--text-main); }
        input[type="date"] { background: transparent; color: var(--text-sub); width: auto; }
        input[type="number"] { width: 120px; }
        .sign-btn { background: var(--group-bg); border: none; border-radius: 10px; padding: 8px 12px; font-size: 15px; font-weight: 700; color: var(--ios-blue); }

        .save-btn { width: 100%; background: var(--ios-blue); color: white; border: none; border-radius: 14px; padding: 16px; font-size: 17px; font-weight: 600; margin-top: 16px; }

        /* 统计面板 */
        .stat-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 8px; }
        .stat-item { background: var(--card-white); padding: 14px 16px; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; height: 64px; box-shadow: 0 0 0 0.5px rgba(0,0,0,0.05); }
        .stat-item.dark { background: linear-gradient(135deg, #1C1C1E, #2C2C2E); color: white; cursor: pointer; }
        .stat-label { font-size: 11px; font-weight: 600; color: var(--text-sub); margin-bottom: 4px; }
        .stat-val { font-size: 19px; font-weight: 700; letter-spacing: -0.5px; position: relative; display: flex; align-items: center; }

        /* 毛玻璃遮罩样式 */
        .blur-mask {
            width: 100px;
            height: 22px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 日历样式保持不变 */
        .grid { display: grid; gap: 6px; }
        .grid-day { grid-template-columns: repeat(5, 1fr); }
        .week { font-size: 13px; color: var(--text-sub); text-align: center; font-weight: 600; padding-bottom: 8px; }
        .cell { border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; aspect-ratio: 1/1; background: #F9F9F9; }
        [data-theme='dark'] .cell { background: #1C1C1E; }
        .cell-p { background: var(--profit-bg) !important; color: var(--profit-text); }
        .cell-l { background: var(--loss-bg) !important; color: var(--loss-text); }
        .d-num { font-size: 15px; font-weight: 600; }
        .d-val { font-size: 11px; font-weight: 700; }

        .view-switcher { background: var(--group-bg); padding: 3px; border-radius: 8px; display: flex; height: 34px; }
        .sw-btn { border: none; background: transparent; padding: 0 14px; font-size: 13px; font-weight: 600; border-radius: 6px; color: var(--text-sub); }
        .sw-btn.active { background: var(--card-white); color: var(--text-main); box-shadow: 0 2px 6px rgba(0,0,0,0.06); }

        .account-switcher { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .ac-btn { border: none; background: var(--group-bg); padding: 12px 8px; font-size: 15px; font-weight: 600; border-radius: 14px; color: var(--text-sub); }
        .ac-btn.active { background: var(--ios-blue); color: white; }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(20px); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        .pop { background: var(--card-white); width: 100%; max-width: 360px; border-radius: 24px; padding: 24px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="card-group">
            <div class="card-group-inner">
                <div class="field-group"><div>📅 记录日期</div><input type="date" id="targetDate" onchange="render();"></div>
                <div class="field-group">
                    <div><span class="brand-tag tag-ali">支</span>支付宝</div>
                    <div class="input-row"><button class="sign-btn" onclick="tSign('alipay')">±</button><input type="number" id="alipay" placeholder="0.00"></div>
                </div>
                <div class="field-group">
                    <div><span class="brand-tag tag-ths">同</span>同花顺</div>
                    <div class="input-row"><button class="sign-btn" onclick="tSign('ths')">±</button><input type="number" id="ths" placeholder="0.00"></div>
                </div>
                <button class="save-btn" onclick="save()">保存收益数据</button>
            </div>
        </div>

        <div class="stat-bar">
            <div class="stat-item">
                <span class="stat-label" id="mLabel">月累计</span>
                <div class="stat-val" id="mTotal">¥ 0.00</div>
            </div>
            <div class="stat-item dark" onclick="togglePrivacy()">
                <span class="stat-label" id="yLabel">年度收益</span>
                <div class="stat-val" id="yTotalContainer">
                    <div id="yTotalText">¥ 0.00</div>
                </div>
            </div>
        </div>

        <div class="card-group">
            <div class="card-group-inner">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <button class="sign-btn" onclick="move(-1)">‹</button>
                        <div id="vTitle" style="font-weight:700">--</div>
                        <button class="sign-btn" onclick="move(1)">›</button>
                    </div>
                    <div class="view-switcher">
                        <button class="sw-btn active" id="sw-day" onclick="switchView('day')">日</button>
                        <button class="sw-btn" id="sw-month" onclick="switchView('month')">月</button>
                        <button class="sw-btn" id="sw-year" onclick="switchView('year')">年</button>
                    </div>
                </div>
                <div id="mainGrid" class="grid grid-day"></div>
            </div>
        </div>

        <div class="card-group"><div class="card-group-inner">
            <div class="account-switcher">
                <button class="ac-btn active" id="ac-all" onclick="switchAccount('all')">全部</button>
                <button class="ac-btn" id="ac-alipay" onclick="switchAccount('alipay')">支付宝</button>
                <button class="ac-btn" id="ac-ths" onclick="switchAccount('ths')">同花顺</button>
            </div>
        </div></div>
    </div>

    <script>
        let vDate = new Date(), viewMode = 'day', yearPrivate = false, accountMode = 'all';
        const KEY = 'fin_v_final_v24';

        window.onload = () => {
            document.getElementById('targetDate').value = new Date().toLocaleDateString('en-CA');
            render();
        };

        function togglePrivacy() { yearPrivate = !yearPrivate; render(); }
        function tSign(id) { const e = document.getElementById(id); if(e.value) e.value = (parseFloat(e.value)*-1).toString(); }
        function switchView(m) { viewMode = m; document.querySelectorAll('.sw-btn').forEach(b=>b.classList.remove('active')); document.getElementById('sw-'+m).classList.add('active'); render(); }
        function switchAccount(m) { accountMode = m; document.querySelectorAll('.ac-btn').forEach(b=>b.classList.remove('active')); document.getElementById('ac-'+m).classList.add('active'); render(); }
        function move(s) { 
            if(viewMode==='day') vDate.setMonth(vDate.getMonth()+s); 
            else vDate.setFullYear(vDate.getFullYear()+s); 
            render(); 
        }

        function getValue(r) {
            if(accountMode==='alipay') return parseFloat(r.a||0);
            if(accountMode==='ths') return parseFloat(r.t||0);
            return parseFloat(r.total||0);
        }

        function render() {
            const grid = document.getElementById('mainGrid'); grid.innerHTML = '';
            const db = JSON.parse(localStorage.getItem(KEY)||'{}');
            const y = vDate.getFullYear(), m = vDate.getMonth();
            
            let mT = 0, yT = 0;
            Object.keys(db).forEach(k => {
                const val = getValue(db[k]);
                if(k.startsWith(y + '-')) {
                    yT += val;
                    if(k.startsWith(`${y}-${String(m+1).padStart(2,'0')}`)) mT += val;
                }
            });

            // 月累计
            const mEl = document.getElementById('mTotal');
            mEl.innerText = '¥ ' + mT.toLocaleString(undefined,{minimumFractionDigits:2});
            mEl.style.color = mT >= 0 ? 'var(--profit-text)' : 'var(--loss-text)';

            // 年度收益 - 毛玻璃遮罩逻辑
            const yContainer = document.getElementById('yTotalContainer');
            if(yearPrivate) {
                yContainer.innerHTML = '<div class="blur-mask"></div>';
            } else {
                const color = yT >= 0 ? 'var(--dark-profit)' : 'var(--dark-loss)';
                yContainer.innerHTML = `<div style="color:${color}">¥ ${yT.toLocaleString(undefined,{minimumFractionDigits:2})}</div>`;
            }

            // 日历渲染逻辑
            if(viewMode === 'day') {
                document.getElementById('vTitle').innerText = `${y}年 ${m+1}月`;
                ['一','二','三','四','五'].forEach(w=>{const d=document.createElement('div');d.className='week';d.innerText=w;grid.appendChild(d);});
                const total = new Date(y, m+1, 0).getDate();
                for(let d=1; d<=total; d++) {
                    const date = new Date(y,m,d);
                    if(date.getDay()===0 || date.getDay()===6) continue;
                    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const r = db[ds], cell = document.createElement('div'); cell.className = 'cell';
                    cell.innerHTML = `<div class="d-num">${d}</div>`;
                    if(r) {
                        const v = getValue(r);
                        cell.classList.add(v>=0?'cell-p':'cell-l');
                        cell.innerHTML += `<div class="d-val">${v>=0?'+':''}${Math.round(v)}</div>`;
                    }
                    grid.appendChild(cell);
                }
            }
        }

        function save() {
            const v1 = parseFloat(document.getElementById('alipay').value)||0, v2 = parseFloat(document.getElementById('ths').value)||0, d = document.getElementById('targetDate').value;
            if(!d) return;
            let db = JSON.parse(localStorage.getItem(KEY)||'{}');
            db[d] = { a: v1, t: v2, total: (v1+v2).toFixed(2) };
            localStorage.setItem(KEY, JSON.stringify(db));
            render();
        }
    </script>
</body>
</html>
