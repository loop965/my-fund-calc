<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>基金加仓计算器</title>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-red: #FF3B30;
            --ios-green: #34C759;
            --ios-bg: #F5F5F7; 
            --ios-card: #FFFFFF;
            --ios-input: #F2F2F7;
            --ios-label: #8E8E93;
            --ios-orange: #FF9500;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
            background-color: var(--ios-bg);
            color: #1C1C1E;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--ios-card);
            border-radius: 30px;
            padding: 30px 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
        }

        h1 { font-size: 22px; font-weight: 800; margin: 0 0 20px; text-align: left; }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .label-text { font-size: 13px; font-weight: 600; color: var(--ios-label); margin-bottom: 6px; display: block; }

        .input-field {
            background: var(--ios-input);
            border: none;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 15px;
            font-weight: 600;
            color: #1C1C1E;
            outline: none;
            width: 100%;
        }

        /* 浅橙色记录区 */
        .record-section {
            background: #FFF9F2;
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .orange-label { color: var(--ios-orange); font-size: 12px; font-weight: 700; margin-bottom: 10px; display: block; }

        .record-card {
            background: white;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 8px;
            position: relative;
        }

        .card-del-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 18px;
            height: 18px;
            background: #D1D1D6;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
        }

        .btn-add-outline {
            width: 100%;
            background: transparent;
            color: var(--ios-orange);
            border: 1.5px dashed #FFD6A5;
            border-radius: 10px;
            padding: 10px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 4px;
        }

        /* 结果面板 */
        .res-panel { margin-top: 5px; border-top: 1px solid #F2F2F7; padding-top: 12px; }
        .res-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 14px; }
        .res-row b { font-variant-numeric: tabular-nums; font-weight: 700; }

        .reset-link {
            text-align: center;
            display: block;
            margin-top: 15px;
            color: var(--ios-label);
            font-size: 12px;
            text-decoration: none;
        }
        .single-gain { font-size: 11px; font-weight: 700; margin-left: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>基金加仓分析</h1>

        <div class="input-grid">
            <div class="input-box">
                <span class="label-text">1. 当前市场价格</span>
                <input type="number" id="currentPrice" class="input-field" value="1.0000" step="0.001" oninput="calculate(true)">
            </div>
            <div class="input-box">
                <span class="label-text">2. 持有总额 (元)</span>
                <input type="number" id="display_total" class="input-field" value="10000" readonly style="color:#8E8E93">
            </div>
        </div>

        <div class="record-section">
            <span class="orange-label">3. 历史买入记录</span>
            <div id="buy-list"></div>
            <button class="btn-add-outline" onclick="addRecord()">+ 添加成交记录</button>
        </div>

        <!-- 结果面板实时显示，不再需要生成按钮 -->
        <div class="res-panel">
            <div class="res-row"><span>总投入成本</span><b id="res-totalA">¥0.00</b></div>
            <div class="res-row"><span>平均持仓成本</span><b id="res-avgP" style="color:var(--ios-blue)">0.0000</b></div>
            <div class="res-row"><span>当前盈亏金额</span><b id="res-loss">0.00</b></div>
            <div class="res-row"><span>当前总收益率</span><b id="res-percent">0.00%</b></div>
            <div class="res-row"><span>回本需涨幅</span><b id="res-need">0.00%</b></div>
        </div>

        <a href="#" class="reset-link" onclick="clearAll()">↺ 重置所有模拟数据</a>
    </div>

    <script>
        let isManualPrice = false;

        function calculate(fromManual = false) {
            if (fromManual) isManualPrice = true;
            const records = document.querySelectorAll('.record-group');
            let totalAmount = 0, totalShares = 0, lastPrice = null;

            records.forEach(group => {
                const amt = parseFloat(group.querySelector('.amt').value) || 0;
                const pri = parseFloat(group.querySelector('.pri').value) || 0;
                if (amt > 0 && pri > 0) { lastPrice = pri; }
            });

            // 自动同步最后一个成交价到市场价（若非手动修改）
            if (!isManualPrice && lastPrice !== null) {
                document.getElementById('currentPrice').value = lastPrice.toFixed(4);
            }

            const currP = parseFloat(document.getElementById('currentPrice').value) || 0;

            records.forEach(group => {
                const amt = parseFloat(group.querySelector('.amt').value) || 0;
                const pri = parseFloat(group.querySelector('.pri').value) || 0;
                const gainEl = group.querySelector('.single-gain');
                if (amt > 0 && pri > 0) {
                    totalAmount += amt;
                    totalShares += amt / pri;
                    const gain = ((currP - pri) / pri * 100).toFixed(2);
                    gainEl.innerText = (gain >= 0 ? '+' : '') + gain + '%';
                    gainEl.style.color = gain >= 0 ? 'var(--ios-red)' : 'var(--ios-green)';
                }
            });

            if (totalShares <= 0) return;

            const avgCost = totalAmount / totalShares;
            const loss = (totalShares * currP) - totalAmount;
            const lossP = (loss / totalAmount * 100).toFixed(2);
            const need = currP > 0 ? ((avgCost - currP) / currP * 100).toFixed(2) : 0;

            document.getElementById('res-totalA').innerText = '¥' + totalAmount.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('res-avgP').innerText = avgCost.toFixed(4);
            document.getElementById('res-loss').innerText = (loss >= 0 ? '+' : '') + loss.toFixed(2);
            document.getElementById('res-loss').style.color = loss >= 0 ? 'var(--ios-red)' : 'var(--ios-green)';
            document.getElementById('res-percent').innerText = (loss >= 0 ? '+' : '') + lossP + '%';
            document.getElementById('res-percent').style.color = loss >= 0 ? 'var(--ios-red)' : 'var(--ios-green)';
            document.getElementById('res-need').innerText = need + '%';
            document.getElementById('res-need').style.color = need > 0 ? 'var(--ios-green)' : 'var(--ios-red)';
            document.getElementById('display_total').value = totalAmount.toFixed(0);
        }

        function addRecord(defaultAmt = "", defaultPri = "") {
            isManualPrice = false;
            const list = document.getElementById('buy-list');
            const div = document.createElement('div');
            div.className = 'record-card record-group';
            div.innerHTML = `
                <div class="card-del-btn" onclick="this.parentElement.remove();calculate()">×</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="input-box">
                        <span class="label-text" style="font-size:11px;">买入金额</span>
                        <input type="number" class="input-field amt" style="padding:10px;" value="${defaultAmt}" oninput="calculate()">
                    </div>
                    <div class="input-box">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span class="label-text" style="font-size:11px;">成交单价</span>
                            <span class="single-gain">0%</span>
                        </div>
                        <input type="number" class="input-field pri" style="padding:10px;" value="${defaultPri}" oninput="calculate()">
                    </div>
                </div>
            `;
            list.appendChild(div);
            calculate();
        }

        function clearAll() {
            if(confirm("确定重置所有记录吗？")) {
                isManualPrice = false;
                document.getElementById('buy-list').innerHTML = '';
                addRecord(10000, 1.000);
            }
        }

        window.onload = () => addRecord(10000, 1.000);
    </script>
</body>
</html>
