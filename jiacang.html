<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>基金加仓计算</title>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-red: #FF3B30;
            --ios-green: #34C759;
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-border: rgba(60, 60, 67, 0.1);
            --ios-secondary: #8E8E93;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
            background-color: var(--ios-bg);
            color: #1C1C1E;
            padding: env(safe-area-inset-top) 20px 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 4px 10px;
        }

        h1 { font-size: 24px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
        .clear-btn { color: var(--ios-blue); border: none; background: none; font-size: 15px; cursor: pointer; }

        .section-title { 
            font-size: 12px; 
            color: var(--ios-secondary); 
            margin: 12px 0 6px 12px; 
            font-weight: 500;
            text-transform: uppercase;
        }

        .card {
            background: var(--ios-card);
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 10px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
            position: relative;
        }

        .card-del-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 18px;
            height: 18px;
            background: rgba(142, 142, 147, 0.12);
            color: #8E8E93;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 0.5px solid var(--ios-border);
        }
        .row:last-child { border-bottom: none; }

        .row-label { font-size: 15px; }
        
        input {
            border: none;
            background: none;
            text-align: right;
            font-size: 16px;
            color: var(--ios-blue);
            width: 120px;
            outline: none;
            font-weight: 500;
            padding-right: 8px;
        }

        /* 本次盈亏显示 */
        .single-res {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
            background: #F2F2F7;
            color: var(--ios-secondary);
        }

        .btn-add {
            width: 100%;
            padding: 12px;
            background: var(--ios-card);
            color: var(--ios-blue);
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 500;
            margin-top: 5px;
            margin-bottom: 5px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
        }

        .res-card { padding: 4px 0; background: white; }
        .res-row { display: flex; justify-content: space-between; padding: 6px 16px; font-size: 15px; }
        .res-row b { font-variant-numeric: tabular-nums; font-weight: 600; font-size: 16px; }
        .divider { height: 0.5px; background: var(--ios-border); margin: 4px 16px; }

        .tag-auto { font-size: 10px; background: #F2F2F7; color: var(--ios-secondary); padding: 1px 4px; border-radius: 3px; margin-left: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>加仓计算</h1>
        <button class="clear-btn" onclick="clearAll()">重置</button>
    </div>

    <div class="section-title">行情价格</div>
    <div class="card">
        <div class="row">
            <div class="row-label">当前市场价格<span class="tag-auto">同步最新</span></div>
            <input type="number" id="currentPrice" value="1.000" step="0.001" oninput="calculate(true)">
        </div>
    </div>

    <div class="section-title">加仓记录</div>
    <div id="buy-list"></div>

    <button class="btn-add" onclick="addRecord()">+ 加仓记录</button>

    <div class="section-title" style="margin-top: 5px;">分析结果</div>
    <div class="card res-card">
        <div class="res-row"><span>总投入成本</span><b id="res-totalA">¥0.00</b></div>
        <div class="res-row"><span>平均持仓成本</span><b id="res-avgP" style="color:var(--ios-blue)">0.0000</b></div>
        <div class="divider"></div>
        <div class="res-row"><span>总盈亏金额</span><b id="res-loss">0.00</b></div>
        <div class="res-row"><span>总收益率</span><b id="res-percent">0.00%</b></div>
        <div class="divider"></div>
        <div class="res-row"><span>回本需涨幅</span><b id="res-need">0.00%</b></div>
    </div>

    <script>
        let isManualPrice = false;

        function calculate(fromManual = false) {
            if (fromManual) isManualPrice = true;

            const currentPriceInput = document.getElementById('currentPrice');
            const records = document.querySelectorAll('.record-group');
            let totalAmount = 0, totalShares = 0, lastPrice = null;

            // 第一遍循环：确定最新价逻辑
            records.forEach(group => {
                const amt = parseFloat(group.querySelector('.amt').value) || 0;
                const pri = parseFloat(group.querySelector('.pri').value) || 0;
                if (amt > 0 && pri > 0) {
                    lastPrice = pri;
                }
            });

            if (!isManualPrice && lastPrice !== null) {
                currentPriceInput.value = lastPrice.toFixed(3);
            }

            const currP = parseFloat(currentPriceInput.value) || 0;

            // 第二遍循环：计算总计和每笔盈亏
            records.forEach(group => {
                const amt = parseFloat(group.querySelector('.amt').value) || 0;
                const pri = parseFloat(group.querySelector('.pri').value) || 0;
                const singleResEl = group.querySelector('.single-res');
                
                if (amt > 0 && pri > 0) {
                    totalAmount += amt;
                    totalShares += amt / pri;
                    
                    // 计算单笔盈亏
                    const singleLossPercent = ((currP - pri) / pri * 100).toFixed(2);
                    singleResEl.innerText = (singleLossPercent >= 0 ? '+' : '') + singleLossPercent + '%';
                    singleResEl.style.color = singleLossPercent >= 0 ? 'var(--ios-red)' : 'var(--ios-green)';
                    singleResEl.style.opacity = '1';
                } else {
                    singleResEl.style.opacity = '0';
                }
            });

            if (totalShares <= 0) return;

            const avgCost = totalAmount / totalShares;
            const marketVal = totalShares * currP;
            const totalLoss = marketVal - totalAmount;
            const totalLossPercent = (totalLoss / totalAmount * 100).toFixed(2);
            const needRise = currP > 0 ? ((avgCost - currP) / currP * 100).toFixed(2) : 0;

            document.getElementById('res-totalA').innerText = '¥' + totalAmount.toLocaleString(undefined, {minimumFractionDigits:2});
            document.getElementById('res-avgP').innerText = avgCost.toFixed(4);
            
            const lossEl = document.getElementById('res-loss');
            const percEl = document.getElementById('res-percent');
            const color = totalLoss >= 0 ? 'var(--ios-red)' : 'var(--ios-green)';
            
            lossEl.style.color = percEl.style.color = color;
            lossEl.innerText = (totalLoss >= 0 ? '+' : '') + totalLoss.toFixed(2);
            percEl.innerText = (totalLoss >= 0 ? '+' : '') + totalLossPercent + '%';
            
            const needEl = document.getElementById('res-need');
            needEl.innerText = needRise + '%';
            needEl.style.color = needRise > 0 ? 'var(--ios-green)' : 'var(--ios-red)';
        }

        function addRecord(defaultAmt = "", defaultPri = "") {
            isManualPrice = false;
            const list = document.getElementById('buy-list');
            const div = document.createElement('div');
            div.className = 'card record-group';
            div.innerHTML = `
                <div class="card-del-btn" onclick="this.parentElement.remove();calculate()">×</div>
                <div class="row">
                    <span class="row-label">买入金额</span>
                    <input type="number" class="amt" placeholder="0" value="${defaultAmt}" oninput="calculate()">
                </div>
                <div class="row">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span class="row-label" style="margin-left:0;">成交单价</span>
                        <span class="single-res" style="opacity:0;">0%</span>
                    </div>
                    <input type="number" class="pri" placeholder="0.000" value="${defaultPri}" oninput="calculate()">
                </div>
            `;
            list.appendChild(div);
            calculate();
        }

        function clearAll() {
            if(confirm("确定清空数据吗？")) {
                isManualPrice = false;
                document.getElementById('buy-list').innerHTML = '';
                addRecord();
            }
        }

        window.onload = () => addRecord(10000, 1.000);
    </script>
</body>
</html>
